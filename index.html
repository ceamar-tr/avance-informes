<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avance Informes y Planillas SMA — CEAMAR</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --verde:#1a5c2e;--verde-s:#e8f5e9;--azul:#0d3d5c;--azul-c:#1565c0;--azul-s:#e3f2fd;
    --amber:#f57c00;--amber-s:#fff3e0;--rojo:#c62828;--rojo-s:#ffebee;
    --gris:#f4f6f8;--borde:#e0e0e0;--texto:#1a1a2e;--suave:#6b7280;
    --sombra:0 2px 14px rgba(0,0,0,0.07);--sombra-hover:0 8px 28px rgba(0,0,0,0.13);
    --r:14px;--bg:#f0f4f8;--card-bg:white;
  }
  [data-theme="dark"]{
    --verde:#4caf50;--verde-s:#1b3a20;--azul:#90caf9;--azul-c:#64b5f6;--azul-s:#0d2137;
    --amber:#ffb74d;--amber-s:#2d1f00;--rojo:#ef5350;--rojo-s:#2d0e0e;
    --gris:#1e2736;--borde:#2d3a4a;--texto:#e2e8f0;--suave:#94a3b8;
    --sombra:0 2px 14px rgba(0,0,0,0.35);--sombra-hover:0 8px 28px rgba(0,0,0,0.5);
    --bg:#0f1623;--card-bg:#1a2333;
  }
  [data-theme="dark"] .tabs,
  [data-theme="dark"] .fchip,
  [data-theme="dark"] .search-input,
  [data-theme="dark"] .proyecto-select,
  [data-theme="dark"] .mes-dropdown,
  [data-theme="dark"] .mes-btn,
  [data-theme="dark"] .kpi,
  [data-theme="dark"] .detalle-panel,
  [data-theme="dark"] .equipo-card,
  [data-theme="dark"] .card,
  [data-theme="dark"] .export-btn,
  [data-theme="dark"] .anio-btn,
  [data-theme="dark"] .pend-card,
  [data-theme="dark"] .resp-chip,
  [data-theme="dark"] .hist-panel,
  [data-theme="dark"] .hist-mes-header,
  [data-theme="dark"] .secc-item,
  [data-theme="dark"] .eq-row{background:var(--card-bg);color:var(--texto);}
  [data-theme="dark"] .secc-item.ok{background:var(--verde-s);}
  [data-theme="dark"] .secc-item.pend{background:var(--rojo-s);}
  [data-theme="dark"] tr:hover td,[data-theme="dark"] .anual-table tr:hover td{background:#1e2d3d;}
  [data-theme="dark"] th,[data-theme="dark"] .anual-table th{background:var(--gris);color:var(--suave);}
  [data-theme="dark"] td{border-color:var(--borde);}
  [data-theme="dark"] .tab.active{background:var(--verde);}
  [data-theme="dark"] .tab:hover{background:var(--gris);}
  [data-theme="dark"] .p-parcial{background:#283593;color:#90caf9;}
  [data-theme="dark"] .side-panel{background:var(--card-bg);}
  [data-theme="dark"] td{border-bottom-color:var(--borde) !important;}
  [data-theme="dark"] .alerta-rojo{background:var(--rojo-s);border-color:var(--rojo);color:var(--rojo);}
  [data-theme="dark"] .alerta-amber{background:var(--amber-s);border-color:var(--amber);color:var(--amber);}
  [data-theme="dark"] .alerta-verde{background:var(--verde-s);border-color:var(--verde);color:var(--verde);}
  [data-theme="dark"] .syncbar.ok{background:var(--verde-s);border-color:var(--verde);}
  [data-theme="dark"] .syncbar.err{background:var(--rojo-s);border-color:var(--rojo);}
  [data-theme="dark"] .syncbar.warn{background:var(--amber-s);border-color:var(--amber);}
  [data-theme="dark"] .syncbar.loading{background:var(--azul-s);border-color:var(--azul-c);}
  [data-theme="dark"] .busq-hist{background:var(--card-bg);}
  [data-theme="dark"] .busq-secc-row:nth-child(even){background:var(--gris);}
  [data-theme="dark"] .busq-mes-label{background:var(--gris);}
  [data-theme="dark"] .cli-filter-chip,[data-theme="dark"] .sort-chip,[data-theme="dark"] .vista-toggle{background:var(--card-bg);color:var(--suave);border-color:var(--borde);}
  [data-theme="dark"] .pend-badge{background:var(--rojo-s);color:var(--rojo);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--texto);min-height:100vh;font-size:14px;transition:background .3s,color .3s;}
  .header{background:linear-gradient(135deg,var(--verde) 0%,var(--azul) 100%);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
  .header-left{display:flex;align-items:center;gap:14px;}
  .logo-wrap{background:white;border-radius:12px;padding:6px 14px;display:flex;align-items:center;flex-shrink:0;}
  .logo-wrap img{height:52px;width:auto;display:block;}
  .htitle{color:white;font-size:16px;font-weight:600;}
  .hsub{color:rgba(255,255,255,0.6);font-size:11px;margin-top:2px;}
  .hright{display:flex;gap:8px;align-items:center;}
  .hbadge{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);}
  .dot{width:6px;height:6px;background:#4caf50;border-radius:50%;display:inline-block;margin-right:4px;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .alertas{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
  .alerta{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;font-size:12px;font-weight:500;flex:1;min-width:200px;}
  .alerta-rojo{background:#ffebee;border:1px solid #ef9a9a;color:#c62828;}
  .alerta-amber{background:#fff3e0;border:1px solid #ffcc80;color:#e65100;}
  .alerta-verde{background:#e8f5e9;border:1px solid #a5d6a7;color:#1a5c2e;}
  .alerta-icon{font-size:16px;flex-shrink:0;}
  .wrap{max-width:1400px;margin:0 auto;padding:22px;}
  .syncbar{border-radius:8px;padding:10px 16px;font-size:11px;display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .syncbar.ok{background:var(--verde-s);border:1px solid #a5d6a7;color:var(--verde);}
  .syncbar.err{background:var(--rojo-s);border:1px solid #ef9a9a;color:var(--rojo);}
  .syncbar.loading{background:var(--azul-s);border:1px solid #90caf9;color:var(--azul-c);}
  .syncbar.warn{background:var(--amber-s);border:1px solid #ffcc80;color:var(--amber);}
  .spin{width:14px;height:14px;border:2px solid rgba(0,0,0,0.1);border-top-color:var(--azul-c);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err-list{font-size:10px;color:var(--rojo);margin-left:8px;opacity:0.8;}
  .tabs{display:flex;gap:4px;margin-bottom:18px;background:white;padding:4px;border-radius:var(--r);box-shadow:var(--sombra);width:fit-content;}
  .tab{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:var(--suave);transition:all .2s;border:none;background:none;font-family:'DM Sans',sans-serif;}
  .tab:hover{background:var(--gris);color:var(--texto);}
  .tab.active{background:var(--verde);color:white;}
  .controles{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
  .flabel{font-size:12px;color:var(--suave);font-weight:500;}
  .fchip{padding:5px 12px;border-radius:20px;font-size:12px;border:1px solid var(--borde);cursor:pointer;background:white;color:var(--suave);transition:all .2s;font-weight:500;}
  .fchip:hover{border-color:var(--verde);color:var(--verde);}
  .fchip.on{background:var(--azul);color:white;border-color:var(--azul);}
  .search-wrap{position:relative;flex:1;min-width:180px;max-width:300px;}
  .search-input{width:100%;padding:7px 14px 7px 34px;border-radius:20px;border:1px solid var(--borde);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;background:white;color:var(--texto);}
  .search-input:focus{border-color:var(--verde);}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--suave);font-size:14px;pointer-events:none;}
  .proyecto-select{padding:7px 14px;border-radius:20px;border:1px solid var(--borde);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;background:white;color:var(--suave);cursor:pointer;max-width:220px;}
  /* SELECTOR DE MES COLAPSABLE */
  .mes-wrap{position:relative;display:inline-block;margin-bottom:16px;}
  .mes-current{display:flex;align-items:center;gap:8px;padding:7px 16px;background:var(--verde);color:white;border-radius:20px;cursor:pointer;font-size:13px;font-weight:500;border:none;font-family:'DM Sans',sans-serif;transition:background .2s;}
  .mes-current:hover{background:#155226;}
  .mes-arrow{font-size:10px;transition:transform .2s;}
  .mes-dropdown{display:none;position:absolute;top:calc(100% + 8px);left:0;background:white;border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,0.15);padding:14px;z-index:200;min-width:320px;border:1px solid var(--borde);}
  .mes-dropdown.open{display:block;}
  .mes-yr-label{font-size:10px;font-weight:700;color:var(--suave);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;}
  .mes-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
  .mes-btn{padding:4px 11px;border-radius:14px;font-size:12px;border:1px solid #a5d6a7;cursor:pointer;background:white;color:var(--suave);transition:all .2s;font-weight:500;}
  .mes-btn:hover,.mes-btn.on{background:var(--verde);color:white;border-color:var(--verde);}
  .mes-btn.a25{border-color:var(--borde);}
  .mes-btn.a25:hover,.mes-btn.a25.on{background:var(--suave);color:white;border-color:var(--suave);}
  .kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px;}
  .kpi{background:white;border-radius:var(--r);padding:15px 17px;box-shadow:var(--sombra);border-left:3px solid transparent;transition:transform .2s;}
  .kpi:hover{transform:translateY(-2px);}
  .kpi.v{border-left-color:var(--verde)}.kpi.a{border-left-color:var(--azul-c)}.kpi.am{border-left-color:var(--amber)}.kpi.r{border-left-color:var(--rojo)}.kpi.t{border-left-color:#00695c}
  .klabel{font-size:11px;color:var(--suave);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  .kval{font-size:28px;font-weight:700;line-height:1;}
  .ksub{font-size:12px;color:var(--suave);margin-top:4px;}
  .kpi{background:var(--card-bg);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sombra);border-left:3px solid transparent;transition:transform .2s,box-shadow .2s;}
  .kpi:hover{transform:translateY(-2px);box-shadow:var(--sombra-hover);}
  /* TARJETAS PROYECTO */
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .proyectos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px;margin-bottom:18px;}
  .proy-card{background:var(--card-bg);border-radius:var(--r);padding:16px;box-shadow:var(--sombra);border-left:5px solid var(--borde);transition:transform .22s,box-shadow .22s;cursor:pointer;animation:fadeUp .35s ease both;}
  .proy-card:hover{transform:translateY(-3px);box-shadow:var(--sombra-hover);}
  .proy-card-body{display:flex;gap:14px;align-items:flex-start;}
  .proy-logo-col{width:78px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;padding:10px 8px;min-height:72px;gap:5px;}
  .proy-logo-col img{max-width:60px;max-height:50px;object-fit:contain;display:block;}
  .proy-logo-col .cli-ini{font-size:22px;font-weight:800;letter-spacing:-1px;}
  .proy-logo-col .cli-name{font-size:9px;font-weight:600;letter-spacing:.3px;text-align:center;opacity:.7;line-height:1.2;}
  .proy-content{flex:1;min-width:0;}
  .proy-nombre{font-size:17px;font-weight:700;color:var(--azul);margin-bottom:3px;line-height:1.25;}
  .proy-campana{font-size:11px;color:var(--suave);margin-bottom:10px;}
  .proy-prog-wrap{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .proy-prog-bar{flex:1;height:8px;background:var(--gris);border-radius:5px;overflow:hidden;}
  .proy-prog-fill{height:100%;border-radius:5px;transition:width .7s ease;}
  .proy-prog-pct{font-size:14px;font-weight:800;color:var(--texto);width:38px;text-align:right;}
  .proy-secciones{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
  .secc-tag{padding:3px 9px;border-radius:10px;font-size:11px;font-weight:500;background:var(--gris);color:var(--suave);}
  .secc-ok{background:var(--gris);color:var(--texto);}
  .secc-pend{background:var(--gris);color:var(--suave);}
  .proy-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  /* Vista compacta */
  .proy-card.compact{padding:10px 14px;border-radius:10px;}
  .proy-card.compact .proy-card-body{gap:10px;align-items:center;}
  .proy-card.compact .proy-logo-col{width:44px;min-height:44px;padding:6px;border-radius:8px;}
  .proy-card.compact .proy-logo-col img{max-width:34px;max-height:30px;}
  .proy-card.compact .proy-logo-col .cli-ini{font-size:14px;}
  .proy-card.compact .proy-logo-col .cli-name{display:none;}
  .proy-card.compact .proy-nombre{font-size:13px;margin-bottom:0;}
  .proy-card.compact .proy-campana{font-size:10px;margin-bottom:4px;}
  .proy-card.compact .proy-secciones{display:none;}
  .proy-card.compact .proy-prog-wrap{margin-bottom:4px;}
  .proy-card.compact .proy-prog-bar{height:5px;}
  .proy-card.compact .proy-prog-pct{font-size:12px;width:28px;}
  .proyectos-grid.compact-mode{grid-template-columns:1fr;}
  /* Filtros cliente */
  .cli-filter-wrap{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
  .cli-filter-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid var(--borde);cursor:pointer;background:var(--card-bg);color:var(--suave);transition:all .2s;}
  .cli-filter-chip:hover{border-color:var(--verde);color:var(--texto);}
  .cli-filter-chip.on{color:white;border-color:transparent;}
  .cli-filter-chip img{height:16px;max-width:40px;object-fit:contain;}
  /* Sort + vista toolbar */
  .grid-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
  .sort-chip{padding:4px 10px;border-radius:14px;font-size:11px;font-weight:500;border:1px solid var(--borde);cursor:pointer;background:var(--card-bg);color:var(--suave);transition:all .2s;}
  .sort-chip:hover{border-color:var(--azul-c);color:var(--azul-c);}
  .sort-chip.on{background:var(--azul-c);color:white;border-color:var(--azul-c);}
  .vista-toggle{padding:5px 11px;border-radius:14px;font-size:12px;font-weight:500;border:1px solid var(--borde);cursor:pointer;background:var(--card-bg);color:var(--suave);transition:all .2s;margin-left:auto;}
  .vista-toggle:hover{border-color:var(--verde);color:var(--verde);}
  .vista-toggle.on{background:var(--verde);color:white;border-color:var(--verde);}
  /* ── Actividad zona + Calendario compacto ── */
  .actividad-zona{background:var(--card-bg);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;box-shadow:var(--sombra);}
  .actividad-zona .grid-toolbar{margin-bottom:8px;}
  /* cal-wrap: layout 2 columnas DENTRO del panel, sin recuadro propio */
  .cal-wrap{display:flex;gap:16px;align-items:flex-start;padding-top:4px;border-top:1px solid var(--borde);}
  [data-theme="dark"] .cal-wrap{border-top-color:var(--borde);}
  .cal-user-select{font-size:11px;border:1px solid var(--borde);border-radius:10px;padding:2px 7px;background:var(--card-bg);color:var(--texto);cursor:pointer;outline:none;max-width:110px;}
  /* Calendario compacto: layout horizontal */
  .cal-wrap{display:flex;gap:12px;align-items:flex-start;}
  .cal-left{flex-shrink:0;width:220px;}
  .cal-right{flex:1;min-width:0;}
  .cal-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .cal-titulo{font-size:11px;font-weight:700;color:var(--texto);}
  .cal-nav-btn{background:none;border:none;cursor:pointer;color:var(--suave);font-size:12px;padding:0 4px;line-height:1;transition:color .15s;}
  .cal-nav-btn:hover{color:var(--azul-c);}
  .cal-grid7{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .cal-day-lbl{text-align:center;font-size:8px;font-weight:700;color:var(--suave);text-transform:uppercase;padding:0 0 3px;}
  .cal-cell{height:26px;border-radius:5px;padding:2px 3px;background:var(--gris);cursor:pointer;transition:background .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .cal-cell:hover{background:var(--azul-s);}
  .cal-cell.cal-empty{background:transparent;cursor:default;pointer-events:none;}
  .cal-cell.cal-today{outline:2px solid var(--azul-c);}
  .cal-cell.cal-selected{background:var(--azul-s) !important;outline:2px solid var(--azul-c);}
  .cal-cell.cal-has-act{background:var(--verde-s);}
  .cal-cell.cal-has-act:hover{background:#c8e6c9;}
  .cal-num{font-size:9px;font-weight:600;color:var(--texto);line-height:1;}
  .cal-cell.cal-today .cal-num{color:var(--azul-c);font-weight:800;}
  .cal-dot-row{display:flex;gap:1px;margin-top:1px;}
  .cal-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
  .cal-dot-cambio{background:var(--verde);}
  .cal-dot-correc{background:var(--azul-c);}
  .cal-dot-resp{background:var(--amber);}
  /* Panel derecho: detalle del día */
  .cal-detail-empty{font-size:11px;color:var(--suave);font-style:italic;padding:4px 0;}
  .cal-detail-titulo{font-size:11px;font-weight:700;color:var(--texto);margin-bottom:5px;text-transform:capitalize;}
  .cal-act-list{max-height:110px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;}
  .cal-act-entry{display:flex;align-items:baseline;gap:5px;}
  .cal-act-hora{font-size:9px;color:var(--suave);flex-shrink:0;white-space:nowrap;}
  .cal-act-texto{font-size:10px;color:var(--texto);line-height:1.35;}
  [data-theme="dark"] .actividad-zona{background:var(--card-bg);}
  [data-theme="dark"] .cal-cell{background:var(--gris);}
  [data-theme="dark"] .cal-cell:hover{background:var(--azul-s);}
  [data-theme="dark"] .cal-cell.cal-has-act{background:var(--verde-s);}
  [data-theme="dark"] .cal-user-select{background:var(--card-bg);color:var(--texto);border-color:var(--borde);}
  /* Pendientes badge en tarjeta */
  .pend-badge{font-size:10px;font-weight:600;background:var(--rojo-s);color:var(--rojo);border-radius:10px;padding:2px 8px;}
  .proy-avatares{display:flex;gap:3px;}
  .av{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;border:2px solid white;}
  .av-sm{width:20px;height:20px;font-size:7px;}
  .pill{display:inline-block;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap;}
  .p-ok{background:var(--verde-s);color:var(--verde);}
  .p-pend{background:var(--amber-s);color:var(--amber);}
  .p-parcial{background:#e8eaf6;color:#283593;}
  .detalle-panel{background:white;border-radius:var(--r);padding:20px;box-shadow:var(--sombra);margin-bottom:18px;display:none;}
  .detalle-panel.visible{display:block;}
  .detalle-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
  .detalle-titulo{font-size:15px;font-weight:600;color:var(--azul);}
  .detalle-sub{font-size:12px;color:var(--suave);margin-top:3px;}
  .cerrar-btn{background:none;border:none;cursor:pointer;color:var(--suave);font-size:18px;padding:2px 6px;border-radius:6px;}
  .cerrar-btn:hover{background:var(--gris);}
  .secc-lista{display:flex;flex-direction:column;gap:6px;}
  .secc-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--gris);}
  .secc-item.ok{background:var(--verde-s);}
  .secc-item.pend{background:var(--rojo-s);}
  .secc-nombre{flex:1;font-size:12px;font-weight:500;}
  .secc-resp{font-size:11px;color:var(--suave);}
  .secc-status{font-size:12px;font-weight:600;width:16px;text-align:center;}
  .secc-item.ok .secc-status{color:var(--verde);}
  .secc-item.pend .secc-status{color:var(--rojo);}
  /* EQUIPO — tarjetas simples */
  .equipo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:18px;}
  .equipo-card{background:white;border-radius:var(--r);padding:18px;box-shadow:var(--sombra);border-top:3px solid transparent;}
  .equipo-card.eq-v{border-top-color:var(--verde);}
  .equipo-card.eq-a{border-top-color:var(--azul-c);}
  .equipo-card.eq-am{border-top-color:var(--amber);}
  .equipo-card.eq-r{border-top-color:var(--rojo);}
  .eq-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .eq-nombre{font-size:14px;font-weight:600;}
  .eq-stats{font-size:12px;color:var(--suave);margin-bottom:10px;}
  .eq-barra-wrap{margin-bottom:10px;}
  .eq-barra{height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;}
  .eq-barra-fill{height:100%;border-radius:3px;}
  .eq-pct{font-size:11px;color:var(--suave);margin-top:4px;text-align:right;}
  .eq-toggle{background:none;border:1px solid var(--borde);border-radius:8px;padding:5px 12px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--suave);width:100%;transition:all .2s;text-align:left;}
  .eq-toggle:hover{border-color:var(--verde);color:var(--verde);}
  .eq-detalle{display:none;margin-top:10px;border-top:1px solid var(--borde);padding-top:10px;}
  .eq-detalle.open{display:block;}
  .eq-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:11px;}
  .eq-row:last-child{border-bottom:none;}
  .eq-row-proy{flex:1;color:var(--azul);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .eq-row-secc{font-size:10px;color:var(--suave);width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .eq-row-status{flex-shrink:0;}
  /* SMA & tablas */
  .card{background:white;border-radius:var(--r);padding:18px;box-shadow:var(--sombra);}
  .ctitle{font-size:11px;font-weight:700;color:var(--suave);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--borde);}
  .twrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th{text-align:left;padding:7px 9px;font-size:10px;font-weight:700;color:var(--suave);text-transform:uppercase;border-bottom:1px solid var(--borde);white-space:nowrap;background:var(--gris);}
  td{padding:7px 9px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}tr:hover td{background:#fafafa;}
  .loading{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:14px;}
  .spin-lg{width:36px;height:36px;border:3px solid var(--borde);border-top-color:var(--verde);border-radius:50%;animation:spin .8s linear infinite;}
  .ltext{font-size:13px;color:var(--suave);}
  .tc{display:none;}.tc.on{display:block;}
  .prog-bar{height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;margin-top:3px;}
  .prog-fill{height:100%;border-radius:3px;}
  /* KPI TENDENCIA */
  .ktend{font-size:10px;margin-top:4px;font-weight:600;}
  .ktend.up{color:var(--verde);}
  .ktend.down{color:var(--rojo);}
  .ktend.eq{color:var(--suave);}
  /* EXPORTAR */
  .export-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--borde);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;background:white;color:var(--suave);transition:all .2s;font-weight:500;display:flex;align-items:center;gap:5px;}
  .export-btn:hover{border-color:var(--verde);color:var(--verde);}
  /* VISTA ANUAL */
  .anual-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .anio-btn{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--borde);cursor:pointer;background:white;color:var(--suave);transition:all .2s;}
  .anio-btn.on{background:var(--verde);color:white;border-color:var(--verde);}
  .anual-wrap{overflow-x:auto;}
  .anual-table{width:100%;border-collapse:collapse;font-size:12px;min-width:700px;}
  .anual-table th{text-align:center;padding:8px 6px;font-size:10px;font-weight:700;color:var(--suave);text-transform:uppercase;background:var(--gris);border-bottom:2px solid var(--borde);white-space:nowrap;position:sticky;top:0;z-index:2;}
  .anual-table th.th-proy{text-align:left;min-width:180px;}
  .anual-table td{padding:8px 6px;text-align:center;border-bottom:1px solid var(--borde);}
  .anual-table td.td-proy{text-align:left;font-weight:600;color:var(--azul);font-size:12px;padding-left:10px;white-space:nowrap;}
  .anual-table tr:nth-child(even) td{background:rgba(0,0,0,0.018);}
  .anual-table tr:hover td{background:var(--azul-s) !important;}
  .anual-table tr.total-row td{background:var(--gris);font-weight:700;border-top:2px solid var(--borde);}
  .td-proy-link{cursor:pointer;transition:color .15s;}
  .td-proy-link:hover{color:var(--azul-c);text-decoration:underline;}
  .mes-dot{width:32px;height:20px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;cursor:pointer;transition:transform .15s;}
  .mes-dot:hover{transform:scale(1.15);}
  .mes-dot.ok{background:var(--verde-s);color:var(--verde);}
  .mes-dot.parcial{background:var(--amber-s);color:var(--amber);}
  .mes-dot.sin{background:#f5f5f5;color:#bbb;}
  .mes-dot.vacio{background:transparent;color:transparent;cursor:default;}
  /* PENDIENTES */
  .pend-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
  .pend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
  .pend-card{background:white;border-radius:var(--r);padding:16px;box-shadow:var(--sombra);}
  .pend-card-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .pend-nombre{font-size:14px;font-weight:600;flex:1;}
  .pend-badge{background:var(--rojo-s);color:var(--rojo);font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;}
  .pend-badge.cero{background:var(--verde-s);color:var(--verde);}
  .pend-lista{display:flex;flex-direction:column;gap:5px;}
  .pend-item{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;border-radius:7px;background:var(--rojo-s);font-size:11px;}
  .pend-item-icon{color:var(--rojo);font-size:12px;flex-shrink:0;margin-top:1px;}
  .pend-item-text{flex:1;}
  .pend-item-proy{font-weight:600;color:var(--azul);}
  .pend-item-secc{color:var(--suave);}
  .pend-empty{padding:12px 8px;font-size:12px;color:var(--verde);text-align:center;}
  /* DÍAS RESTANTES */
  .dias-badge{background:rgba(255,255,255,0.15);color:white;font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid rgba(255,255,255,0.25);font-weight:600;}
  .dias-badge.urgente{background:rgba(220,50,50,0.3);border-color:rgba(255,120,120,0.4);}
  .dias-badge.ok{background:rgba(76,175,80,0.25);border-color:rgba(76,175,80,0.4);}
  /* FILTRO RESPONSABLE */
  .resp-chip{padding:4px 10px;border-radius:20px;font-size:11px;border:1px solid var(--borde);cursor:pointer;background:white;color:var(--suave);transition:all .2s;font-weight:500;display:inline-flex;align-items:center;gap:5px;}
  .resp-chip:hover{border-color:var(--azul-c);color:var(--azul-c);}
  .resp-chip.on{background:var(--azul-c);color:white;border-color:var(--azul-c);}
  .resp-chip .av-xs{width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;}
  /* URGENTES */
  .urgentes-wrap{background:linear-gradient(135deg,#0d3d5c,#1565c0);border-radius:var(--r);padding:16px 20px;margin-bottom:18px;color:white;box-shadow:0 4px 20px rgba(21,101,192,0.35);}
  .urgentes-titulo{font-size:14px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
  .urgentes-toggle-icon{margin-left:auto;font-size:12px;opacity:.8;transition:transform .2s;}
  .urgentes-toggle-icon.open{transform:rotate(180deg);}
  .urgentes-body{overflow:hidden;transition:max-height .3s ease;}
  .urgentes-sub{font-size:11px;opacity:.8;margin-bottom:12px;margin-top:4px;}
  .urgentes-grid{display:flex;flex-direction:column;gap:6px;}
  .urgente-row{background:rgba(255,255,255,0.1);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .urgente-proy{font-size:12px;font-weight:700;color:white;flex:1;min-width:120px;}
  .urgente-seccs{display:flex;flex-wrap:wrap;gap:4px;flex:2;}
  .urgente-secc{background:rgba(255,255,255,0.18);border-radius:6px;padding:2px 8px;font-size:11px;color:white;border:1px solid rgba(255,255,255,0.3);}
  .urgente-color-btns{display:flex;gap:4px;flex-shrink:0;}
  .urgente-color-btn{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);cursor:pointer;transition:transform .15s;flex-shrink:0;}
  .urgente-color-btn:hover,.urgente-color-btn.active{transform:scale(1.3);border-color:white;}
  .urgente-color-btn.c-rojo{background:#ff5252;}
  .urgente-color-btn.c-amarillo{background:#ffd740;}
  .urgente-color-btn.c-verde{background:#69f0ae;}
  .urgente-color-btn.c-ninguno{background:rgba(255,255,255,0.25);}
  .urgente-row.col-rojo{background:rgba(255,82,82,0.4);border-left:4px solid #ff5252;}
  .urgente-row.col-amarillo{background:rgba(255,215,64,0.3);border-left:4px solid #ffd740;}
  .urgente-row.col-verde{background:rgba(105,240,174,0.2);border-left:4px solid #69f0ae;}
  .urgentes-sincolor-toggle{font-size:11px;opacity:.75;cursor:pointer;padding:4px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.08);display:inline-flex;align-items:center;gap:5px;margin-top:4px;transition:background .2s;}
  .urgentes-sincolor-toggle:hover{background:rgba(255,255,255,0.16);}
  [data-theme="dark"] .urgentes-wrap{background:linear-gradient(135deg,#062033,#0d3d5c);}
  /* Responsable corrección */
  .correc-wrap{margin-top:10px;padding-top:10px;border-top:1px solid var(--borde);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .correc-label{font-size:10px;font-weight:600;color:var(--suave);text-transform:uppercase;letter-spacing:.4px;}
  .correc-input{flex:1;min-width:120px;padding:5px 10px;border-radius:10px;border:1px solid var(--borde);font-size:12px;font-family:'DM Sans',sans-serif;background:var(--gris);color:var(--texto);outline:none;}
  .correc-input:focus{border-color:var(--verde);}
  .correc-save-btn{padding:5px 12px;border-radius:10px;background:var(--verde);color:white;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .correc-badge{font-size:11px;font-weight:600;color:var(--verde);background:var(--verde-s);border-radius:10px;padding:3px 10px;display:flex;align-items:center;gap:5px;}
  .correc-edit{font-size:10px;color:var(--suave);cursor:pointer;text-decoration:underline;}
  /* Peticiones */
  .peticiones-wrap{background:#fffde7;border:1.5px solid #ffd54f;border-radius:var(--r);padding:16px 20px;margin-bottom:18px;}
  [data-theme="dark"] .peticiones-wrap{background:#2a2200;border-color:#ffd54f;}
  .peticiones-titulo{font-size:13px;font-weight:700;color:#e65100;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .peticion-item{background:white;border:1px solid #ffe082;border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;}
  [data-theme="dark"] .peticion-item{background:#1a1500;border-color:#ffd54f;}
  .peticion-color{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
  .peticion-texto{flex:1;font-size:12px;color:var(--texto);line-height:1.5;}
  .peticion-meta{font-size:10px;color:var(--suave);margin-top:3px;}
  .peticion-del{background:none;border:none;cursor:pointer;color:var(--suave);font-size:14px;padding:0 4px;flex-shrink:0;}
  .peticion-del:hover{color:var(--rojo);}
  .peticion-form{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;}
  .peticion-input{flex:1;min-width:180px;padding:7px 12px;border-radius:10px;border:1px solid #ffe082;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;background:white;color:var(--texto);}
  [data-theme="dark"] .peticion-input{background:#1a1500;border-color:#ffd54f;color:var(--texto);}
  .peticion-input:focus{border-color:#f57c00;}
  .peticion-select{padding:7px 10px;border-radius:10px;border:1px solid #ffe082;font-size:12px;font-family:'DM Sans',sans-serif;background:white;color:var(--texto);cursor:pointer;outline:none;}
  [data-theme="dark"] .peticion-select{background:#1a1500;border-color:#ffd54f;color:var(--texto);}
  .peticion-add-btn{padding:7px 14px;border-radius:10px;background:#f57c00;color:white;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s;}
  .peticion-add-btn:hover{background:#e65100;}
  /* BÚSQUEDA HISTÓRICA */
  .busq-hist{background:var(--card-bg);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sombra);margin-bottom:18px;display:none;border-left:4px solid var(--azul-c);}
  .busq-hist.visible{display:block;}
  .busq-hist-title{font-size:14px;font-weight:700;color:var(--azul);margin-bottom:4px;}
  .busq-hist-sub{font-size:11px;color:var(--suave);margin-bottom:14px;}
  .busq-proy-block{margin-bottom:18px;}
  .busq-proy-nombre{font-size:13px;font-weight:700;color:var(--azul);margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--borde);display:flex;align-items:center;gap:8px;}
  .busq-proy-color{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .busq-mes-group{margin-bottom:10px;}
  .busq-mes-label{font-size:11px;font-weight:700;color:var(--suave);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;padding:3px 8px;background:var(--gris);border-radius:6px;display:inline-block;}
  .busq-secc-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;font-size:12px;}
  .busq-secc-row:nth-child(even){background:var(--gris);}
  .busq-secc-nombre{font-weight:500;margin-right:6px;}
  .busq-secc-resp{color:var(--suave);font-size:11px;display:flex;align-items:center;gap:4px;}
  /* PANEL LATERAL DETALLE (slide-in) */
  .side-panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:500;backdrop-filter:blur(2px);}
  .side-panel-overlay.open{display:block;}
  .side-panel{position:fixed;top:0;right:-480px;width:460px;max-width:95vw;height:100vh;background:var(--card-bg);box-shadow:-6px 0 32px rgba(0,0,0,0.18);z-index:501;display:flex;flex-direction:column;transition:right .3s cubic-bezier(.4,0,.2,1);overflow:hidden;}
  .side-panel.open{right:0;}
  .side-panel-header{padding:18px 20px 14px;border-bottom:1px solid var(--borde);flex-shrink:0;}
  .side-panel-titulo{font-size:15px;font-weight:700;color:var(--azul);margin-bottom:3px;}
  .side-panel-sub{font-size:11px;color:var(--suave);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .side-panel-body{flex:1;overflow-y:auto;padding:16px 20px;}
  .side-panel-footer{padding:12px 20px;border-top:1px solid var(--borde);display:flex;gap:8px;flex-shrink:0;}
  .ruta-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--azul-c);color:var(--azul-c);background:var(--azul-s);cursor:pointer;text-decoration:none;transition:all .2s;font-family:'DM Sans',sans-serif;}
  .ruta-btn:hover{background:var(--azul-c);color:white;}
  /* HISTORIAL PROYECTO */
  .hist-panel{background:white;border-radius:var(--r);padding:20px;box-shadow:var(--sombra);margin-bottom:18px;display:none;}
  .hist-panel.visible{display:block;}
  .hist-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
  .hist-titulo{font-size:15px;font-weight:600;color:var(--azul);}
  .hist-sub{font-size:12px;color:var(--suave);margin-top:2px;}
  .hist-timeline{display:flex;flex-direction:column;gap:10px;}
  .hist-mes{border:1px solid var(--borde);border-radius:10px;overflow:hidden;}
  .hist-mes-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:var(--gris);transition:background .15s;}
  .hist-mes-header:hover{background:#e8edf2;}
  .hist-mes-label{font-size:12px;font-weight:600;color:var(--azul);flex:1;}
  .hist-mes-pill{flex-shrink:0;}
  .hist-mes-pct{font-size:11px;color:var(--suave);width:36px;text-align:right;}
  .hist-mes-body{display:none;padding:8px 14px 12px;border-top:1px solid var(--borde);}
  .hist-mes-body.open{display:block;}
  .hist-secc{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:11px;border-bottom:1px solid #f5f5f5;}
  .hist-secc:last-child{border-bottom:none;}
  @media(max-width:900px){.kgrid{grid-template-columns:repeat(2,1fr)}.proyectos-grid{grid-template-columns:1fr}.equipo-grid{grid-template-columns:repeat(2,1fr)}.pend-grid{grid-template-columns:1fr}.wrap{padding:14px}}
  /* EDICIÓN INLINE */
  .secc-edit-field{cursor:pointer;padding:1px 5px;border-radius:4px;transition:background .15s;border-bottom:1px dashed transparent;}
  .secc-edit-field:hover{background:var(--azul-s);border-bottom-color:var(--azul-c);}
  .secc-edit-input{font-size:12px;padding:2px 7px;border:1.5px solid var(--azul-c);border-radius:5px;outline:none;font-family:'DM Sans',sans-serif;background:var(--card-bg);color:var(--texto);width:120px;}
  .toggle-comp{background:none;border:none;cursor:pointer;font-size:14px;padding:0 3px;border-radius:4px;transition:transform .15s;flex-shrink:0;}
  .toggle-comp:hover{transform:scale(1.25);}
  .save-toast{position:fixed;bottom:24px;right:24px;background:#1a2333;color:white;padding:8px 16px;border-radius:20px;font-size:12px;font-family:'DM Sans',sans-serif;z-index:9999;display:none;box-shadow:0 4px 20px rgba(0,0,0,0.3);transition:opacity .3s;}
  .save-toast.show{display:block;}
  .save-toast.ok{background:#1a5c2e;}
  .save-toast.err{background:#c62828;}
  /* LOGOS DE CLIENTE */
  .cliente-logo{height:22px;max-width:70px;object-fit:contain;vertical-align:middle;}
  .cliente-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;letter-spacing:.5px;vertical-align:middle;}
  .proy-cliente{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
  [data-theme="dark"] .secc-edit-field:hover{background:var(--azul-s);}
  [data-theme="dark"] .secc-edit-input{background:var(--card-bg);color:var(--texto);}
  [data-theme="dark"] .save-toast{background:#1a2333;}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo-wrap">
      <img src="logos/CEAMAR.jpg" alt="CEAMAR" style="height:52px;width:auto;display:block;" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <svg width="110" height="44" viewBox="0 0 110 44" xmlns="http://www.w3.org/2000/svg" style="display:none;">
        <text x="4" y="18" font-family="Arial Black,Arial,sans-serif" font-size="18" font-weight="900" fill="#1a7a2e" letter-spacing="1">CEA</text>
        <text x="47" y="18" font-family="Arial Black,Arial,sans-serif" font-size="18" font-weight="900" fill="#1565c0" letter-spacing="1">MAR</text>
        <path d="M8 26 Q20 20 35 26 Q55 34 75 24 Q90 16 104 22" stroke="#1565c0" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.85"/>
        <text x="55" y="41" font-family="Arial,sans-serif" font-size="7" font-weight="700" fill="#1565c0" text-anchor="middle" letter-spacing="0.8">ESTUDIOS AMBIENTALES</text>
      </svg>
    </div>

// ─── CACHÉ localStorage ───────────────────────────────────
function getCached(key){
  try{
    var item = localStorage.getItem(key);
    if(!item) return null;
    var p = JSON.parse(item);
    if(Date.now() - p.ts > CACHE_TTL){ localStorage.removeItem(key); return null; }
    return p.data;
  }catch(e){ return null; }
}
function setCached(key, data){
  try{ localStorage.setItem(key, JSON.stringify({ts:Date.now(), data:data})); }catch(e){}
}

// ─── ESTADO GLOBAL ───────────────────────────────────────
var ALL = [], camp = 'Todas', mesSel = '', anioSel = '2026', respFiltro = '';

// ─── FETCH con caché ──────────────────────────────────────
function fetchSheet(id, sheetName, source){
  var cacheKey = 'ceamar3_' + source + '_' + sheetName;
  var cached = getCached(cacheKey);
  if(cached){ return Promise.resolve(cached); }

  var url = 'https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(sheetName)+'&headers=1';
  return fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(txt){
      var m = txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
      if(!m) return [];
      var json = JSON.parse(m[1]);
      if(!json.table||!json.table.rows||!json.table.rows.length) return [];

      // Detectar columnas por nombre de encabezado (robusto ante cambios de orden)
      var cols = json.table.cols || [];
      function nrm(s){ return s?String(s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim():''; }
      function findCol(keywords, exclude, fallback){
        exclude = exclude||[];
        for(var i=0;i<cols.length;i++){
          var lbl=nrm(cols[i].label);
          if(!lbl) continue;
          var hit=keywords.some(function(k){return lbl.indexOf(k)>=0;});
          var bad=exclude.some(function(k){return lbl.indexOf(k)>=0;});
          if(hit&&!bad) return i;
        }
        return fallback;
      }
      var iP  = findCol(['proyecto'],              [],      0);
      var iC  = findCol(['campana'],               ['norm'],1);
      var iS  = findCol(['secc'],                  [],      2);
      var iR  = findCol(['responsable','resp'],    ['sma'], 3);
      var iDo = findCol(['complet','entregad','hecho','listo'],[], 4);
      var iU  = findCol(['ubic','ruta','carpeta','path'],   [], 5);
      var iSMA= findCol(['sma'],                   [],      6);
      var iCN = findCol(['norm'],                  [],      7);
      var iA  = findCol(['ano','year','anio'],      [],      8);

      var rows=[], pA='', cA='', cnA='', aA='';
      json.table.rows.forEach(function(row){
        if(!row.c) return;
        function cv(i){
          if(i<0||i>=row.c.length)return'';
          var c=row.c[i];
          if(!c)return'';
          if(typeof c.v==='boolean')return c.v;
          return c.v==null?'':c.v;
        }
        var proyecto    = String(cv(iP) ||'').trim();
        var campana     = String(cv(iC) ||'').trim();
        var seccion     = String(cv(iS) ||'').trim();
        var responsable = String(cv(iR) ||'').trim();
        var completado  = (cv(iDo)===true||String(cv(iDo)).toUpperCase()==='TRUE');
        var ubicacion   = String(cv(iU) ||'').trim();
        var smaResp     = String(cv(iSMA)||'').trim();
        var campaNorm   = String(cv(iCN) ||'').trim();
        var anio        = cv(iA)?String(cv(iA)).trim():'';
        if(proyecto)  pA=normalizarProyecto(proyecto);
        if(campana)   cA=campana;
        if(campaNorm) cnA=campaNorm;
        if(anio)      aA=anio;
        if(!seccion)  return;
        rows.push({proyecto:pA,campana:cA,campanaNorm:cnA,anio:aA||source,
                   seccion:seccion,responsable:responsable,completado:completado,
                   ubicacion:ubicacion,smaResp:smaResp,mes:sheetName,source:source});
      });
      setCached(cacheKey, rows);
      return rows;
    })
    .catch(function(){ return null; }); // null = error
}

// ─── CARGA PRINCIPAL ─────────────────────────────────────
function cargar(){
  var now = new Date();
  var curMes = MESES_ORD[now.getMonth()];

  // Construir lista de tareas, priorizando mes actual
  var tasks = [];
  HOJAS_2025.forEach(function(mes){ tasks.push({id:S25,mes:mes,source:'2025'}); });
  HOJAS_2026.forEach(function(mes){ tasks.push({id:S26,mes:mes,source:'2026'}); });

  tasks.sort(function(a,b){
    var ap = (a.mes===curMes)?0:1, bp = (b.mes===curMes)?0:1;
    return ap - bp;
  });

  var total = tasks.length, done = 0, errors = [];
  var primerRenderHecho = false;

  var promises = tasks.map(function(task){
    return fetchSheet(task.id, task.mes, task.source).then(function(rows){
      done++;
      if(rows === null){
        errors.push(task.source+' '+task.mes);
        rows = [];
      }
      ALL = ALL.concat(rows);
      document.getElementById('stxt').textContent = 'Cargando... '+done+'/'+total+' hojas';

      // Render anticipado al terminar el mes actual (las primeras 2 tareas)
      if(!primerRenderHecho && done >= Math.min(2, total)){
        primerRenderHecho = true;
        var rec = detectRec(); mesSel=rec.mes; anioSel=rec.anio;
        buildSel(); buildProyectoSelect(); render(); renderAlertas(); renderEquipo(); renderSMA(); renderPendientes(); renderAnual();
      }
    });
  });

  Promise.all(promises).then(function(){
    var now2 = new Date();
    if(!mesSel){ var rec=detectRec(); mesSel=rec.mes; anioSel=rec.anio; }
    detectarCambiosDrive(); // detectar cambios vs snapshot anterior
    buildSel(); buildProyectoSelect(); render(); renderAlertas(); renderEquipo(); renderSMA(); renderPendientes(); renderAnual();
    renderCalActividad(); // refrescar calendario con datos actualizados
    document.getElementById('fhdr').textContent = now2.toLocaleDateString('es-CL',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

    var errTxt = errors.length ? ' · '+errors.length+' hoja'+(errors.length>1?'s':'')+' con error' : '';
    document.getElementById('sbar').className = 'syncbar '+(errors.length?'warn':'ok');
    document.getElementById('stxt').textContent =
      '✓ Sincronizado · '+ALL.length+' secciones · '+mesSel+' '+anioSel+' · '+now2.toLocaleTimeString('es-CL')+errTxt;
    if(errors.length){
      document.getElementById('stxt').insertAdjacentHTML('afterend',
        '<span class="err-list">Errores: '+errors.join(', ')+'</span>');
    }
  });
}

// ─── AGRUPACIÓN POR PROYECTO (deduplicado por nombre) ────
function getProy(rows){
  var map = {};
  rows.forEach(function(r){
    // Clave solo por nombre: agrupa todas las campañas del mismo proyecto
    var k = r.proyecto;
    if(!map[k]) map[k]={proyecto:r.proyecto,campanas:[],campanaNorms:[],mes:r.mes,source:r.source,
                         secciones:[],resp:[],sma:[]};
    map[k].secciones.push(r);
    if(r.campana&&map[k].campanas.indexOf(r.campana)<0) map[k].campanas.push(r.campana);
    // Acumular nombres normalizados únicos (Verano, Invierno, etc.)
    var cn=r.campanaNorm||r.campana;
    if(cn&&map[k].campanaNorms.indexOf(cn)<0) map[k].campanaNorms.push(cn);
    if(r.responsable&&map[k].resp.indexOf(r.responsable)<0) map[k].resp.push(r.responsable);
    if(r.smaResp&&map[k].sma.indexOf(r.smaResp)<0) map[k].sma.push(r.smaResp);
  });
  return Object.keys(map).map(function(k){
    var p=map[k],tot=p.secciones.length,comp=p.secciones.filter(function(s){return s.completado;}).length;
    return Object.assign({},p,{campana:p.campanaNorms.join(' · '),
                                tot:tot,comp:comp,pct:tot>0?Math.round(comp/tot*100):0,done:comp===tot});
  });
}

// ─── DETECTAR MES ACTUAL DEL CALENDARIO ──────────────────
function detectRec(){
  var now = new Date();
  var mesCal = MESES_ORD[now.getMonth()];
  var anioCal = String(now.getFullYear());

  // 1. Intentar el mes actual del calendario (aunque la hoja esté vacía, es el correcto)
  if(ALL.some(function(r){return r.source===anioCal;}) || anioCal==='2026'){
    return{mes:mesCal, anio:anioCal};
  }
  // 2. Si no hay datos del año actual, buscar el mes más reciente con datos
  var i;
  for(i=MESES_ORD.length-1;i>=0;i--){
    if(ALL.some(function(r){return r.mes===MESES_ORD[i]&&r.source==='2026';}))
      return{mes:MESES_ORD[i],anio:'2026'};
  }
  for(i=MESES_ORD.length-1;i>=0;i--){
    if(ALL.some(function(r){return r.mes===MESES_ORD[i]&&r.source==='2025';}))
      return{mes:MESES_ORD[i],anio:'2025'};
  }
  return{mes:mesCal,anio:'2026'};
}

  proyectos.forEach(function(p){
    var cliente = PROYECTO_CLIENTE[p] || PROYECTO_CLIENTE[(p||'').trim()];

  var sel = document.getElementById('proyecto-select');

      var opt = document.createElement('option');

      opt.value = p;
      opt.textContent = p;

    sinCliente.forEach(function(p){

      grpSin.appendChild(opt);

  }

// ─── TENDENCIA ───────────────────────────────────────────
function tendencia(valActual, total, mesComp, anioComp){
  if(!mesComp||!anioComp) return '';
  var fdPrev=ALL.filter(function(r){return r.mes===mesComp&&r.source===anioComp;});
  if(!fdPrev.length) return '';
  var pPrev=getProy(fdPrev);
  var tPrev=pPrev.length, cPrev=pPrev.filter(function(p){return p.done;}).length;
  var pctPrev=tPrev>0?Math.round(cPrev/tPrev*100):0;
  var pctAct=total>0?Math.round(valActual/total*100):0;
  var diff=pctAct-pctPrev;
  if(diff>0) return '<div class="ktend up">▲ +'+diff+'% vs '+mesComp.substring(0,3)+' '+anioComp+'</div>';
  if(diff<0) return '<div class="ktend down">▼ '+diff+'% vs '+mesComp.substring(0,3)+' '+anioComp+'</div>';
  return '<div class="ktend eq">= igual vs '+mesComp.substring(0,3)+' '+anioComp+'</div>';
}

// ─── RENDER PROYECTOS ────────────────────────────────────
function render(){
  renderUrgentes();
  var fd=getF(), proyectos=getProy(fd);
  var tP=proyectos.length,cP=proyectos.filter(function(p){return p.done;}).length,peP=tP-cP;
  var pct=tP>0?Math.round(cP/tP*100):0;
  var allR=[];fd.forEach(function(r){if(r.responsable&&allR.indexOf(r.responsable)<0)allR.push(r.responsable);});
  // Planilla SMA incompleta = alguna sección no tiene smaResp
  var sinSMA=proyectos.filter(function(p){
    return p.secciones.some(function(s){ return !s.smaResp||!s.smaResp.trim(); });
  }).length;

  // Año de comparación: si vemos 2026 → comparar con 2025, si 2025 → sin comparación
  var anioComp=anioSel==='2026'?'2025':null;
  var tend=anioComp?tendencia(cP,tP,mesSel,anioComp):'';

  // Secciones sin responsable (no proyectos, sino filas individuales)
  var sinResp = fd.filter(function(r){ return !r.responsable||!r.responsable.trim(); }).length;
  // Tendencias individuales
  var tendComp='', tendPend='', tendSinResp='';
  if(anioComp){
    var fdPrev2=ALL.filter(function(r){return r.mes===mesSel&&r.source===anioComp;});
    if(fdPrev2.length){
      var pPrev2=getProy(fdPrev2);
      var cPrev2=pPrev2.filter(function(p){return p.done;}).length;
      var pePrev2=pPrev2.length-cPrev2;
      var srPrev2=fdPrev2.filter(function(r){return !r.responsable||!r.responsable.trim();}).length;
      var diffC=cP-cPrev2, diffP=peP-pePrev2, diffSR=sinResp-srPrev2;
      var mes3=mesSel.substring(0,3)+' '+anioComp;
      tendComp = diffC>0?'<div class="ktend up">▲ +'  +diffC +' vs '+mes3+'</div>'
               : diffC<0?'<div class="ktend down">▼ '+diffC+' vs '+mes3+'</div>':'';
      tendPend = diffP<0?'<div class="ktend up">▲ '   +diffP +' vs '+mes3+'</div>'
               : diffP>0?'<div class="ktend down">▼ +'+diffP+' vs '+mes3+'</div>':'';
      tendSinResp = diffSR<0?'<div class="ktend up">▲ '+diffSR+' vs '+mes3+'</div>'
                 : diffSR>0?'<div class="ktend down">▼ +'+diffSR+' vs '+mes3+'</div>':'';
    }
  }

  document.getElementById('kgrid').innerHTML=
    '<div class="kpi a"><div class="klabel">Proyectos</div><div class="kval">'+tP+'</div><div class="ksub">'+mesSel+' '+anioSel+'</div></div>'+
    '<div class="kpi v"><div class="klabel">Completados</div><div class="kval">'+cP+'</div><div class="ksub">'+pct+'%</div>'+tendComp+'</div>'+
    '<div class="kpi am"><div class="klabel">Pendientes</div><div class="kval">'+peP+'</div><div class="ksub">'+(100-pct)+'%</div>'+tendPend+'</div>'+
    '<div class="kpi r"><div class="klabel">Sin responsable</div><div class="kval">'+sinResp+'</div><div class="ksub">secciones sin asignar</div>'+tendSinResp+'</div>'+
    '<div class="kpi t"><div class="klabel">Planilla SMA incompleta</div><div class="kval">'+sinSMA+'</div><div class="ksub">proyectos con secc. pendiente</div></div>';

  // Filtro por cliente
  if(clienteFiltroActivo){
    proyectos = proyectos.filter(function(p){ return getClienteDeProyecto(p.proyecto)===clienteFiltroActivo; });
  }
  // Ordenar
  if(sortMode==='pct_desc') proyectos.sort(function(a,b){ return b.pct-a.pct; });
  else if(sortMode==='pct_asc') proyectos.sort(function(a,b){ return a.pct-b.pct; });
  else if(sortMode==='nombre') proyectos.sort(function(a,b){ return displayNombre(a.proyecto).localeCompare(displayNombre(b.proyecto)); });
  else { // 'estado': sin iniciar → parcial → completo
    var order={'sin-iniciar':0,'parcial':1,'completo':2};

      var ca=a.done?'completo':a.comp>0?'parcial':'sin-iniciar';
      var cb=b.done?'completo':b.comp>0?'parcial':'sin-iniciar';
      return order[ca]-order[cb];
    });

  renderClienteFiltros();

  if(!proyectos.length){

    var avatares=p.resp.slice(0,4).map(function(r){
      var c=gc(r);return '<span class="av av-sm" style="background:'+c.bg+';color:'+c.fg+';" title="'+r+'">'+ini(r)+'</span>';

    var cfg = cliente ? (CLIENTES_CONFIG[cliente]||{}) : {};
    var clienteColor = cfg.color || getPrColor(p.proyecto);

function buildCorreccionHTML(proyecto, mes, source, done){

  var key = proyecto+'|'+mes+'|'+source;
  var rCorr = correccionResp[key]||'';
  var safeId = proyecto.replace(/[^a-zA-Z0-9]/g,'_');

  if(rCorr){

      +'<span class="correc-label">✏️ En corrección:</span>'
      +'<span class="correc-badge">'+rCorr+'</span>'
      +'<span class="correc-edit" onclick="event.stopPropagation();editarCorreccion(\''+safePCorr+'\',\''+mes+'\',\''+source+'\')">cambiar</span>'
      +'</div>';

    +'<span class="correc-label">✏️ Responsable corrección:</span>'
    +'<input class="correc-input" id="correc-input-'+safeId+'" type="text" placeholder="Nombre..." onclick="event.stopPropagation()">'
    +'<button class="correc-save-btn" onclick="event.stopPropagation();guardarCorreccion(\''+safePCorr+'\',\''+mes+'\',\''+source+'\')">Asignar</button>'

var correccionResp = JSON.parse(localStorage.getItem('ceamar_correc') || '{}');
function guardarCorreccion(proyecto, mes, anio){
  var input = document.getElementById('correc-input-'+CSS.escape(proyecto));

}

var actividadLog = (function(){ try{ return JSON.parse(localStorage.getItem('ceamar_actividad')||'[]'); }catch(e){ return []; } })();
var usuarioActivo = localStorage.getItem('ceamar_usuario_activo') || '';

var calAnioVista = new Date().getFullYear();

var RESPONSABLES_CAL = ['Nathalie','Rocío','Tamara','Abigail'];
var MESES_CAL = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
var DIAS_SEMANA_CAL = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];

function logActividad(texto, tipo){
  var now = new Date();
  var fechaKey = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  var hora = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  actividadLog.unshift({fecha:fechaKey, hora:hora, texto:texto, tipo:tipo||'cambio'});
  if(actividadLog.length>500) actividadLog=actividadLog.slice(0,500);
  try{ localStorage.setItem('ceamar_actividad', JSON.stringify(actividadLog)); }catch(e){}
  renderCalActividad();
}

// Detecta cambios en los datos de Drive vs snapshot anterior y los loguea
function detectarCambiosDrive(){
  var snapshotKey = 'ceamar_drive_snap';
  var oldSnap = {};
  try{ oldSnap = JSON.parse(localStorage.getItem(snapshotKey)||'{}'); }catch(e){}
  var esNuevo = Object.keys(oldSnap).length === 0;

  var newSnap = {};
  ALL.forEach(function(r){
    var k = r.proyecto+'|'+r.mes+'|'+r.source+'|'+r.seccion;
    newSnap[k] = r.completado;
  });

  var now = new Date();
  var fechaKey = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  var hora = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var nuevasEntradas = [];

  if(esNuevo){
    // Primera vez: registrar todas las secciones completadas del mes visible como "estado al cargar"
    ALL.forEach(function(r){
      if(r.completado && r.mes === mesSel && r.source === anioSel){
        var actor = r.responsable ? r.responsable+' completó' : 'Completado:';
        nuevasEntradas.push({
          fecha: fechaKey, hora: hora,
          texto: actor+' "'+r.seccion+'" de '+displayNombre(r.proyecto),
          tipo: 'cambio'
        });
      }
    });
  } else {
    // Cargas posteriores: solo cambios reales desde Drive
    Object.keys(newSnap).forEach(function(k){
      if(k in oldSnap && oldSnap[k] !== newSnap[k]){
        var parts = k.split('|');
        var proyecto = parts[0], seccion = parts[3];
        var accion = newSnap[k] ? 'completó' : 'reabrió';
        nuevasEntradas.push({
          fecha: fechaKey, hora: hora,
          texto: 'Drive: '+accion+' "'+seccion+'" de '+displayNombre(proyecto),
          tipo: 'cambio'
        });
      }
    });
  }

  if(nuevasEntradas.length > 0){
    actividadLog = nuevasEntradas.concat(actividadLog);
    if(actividadLog.length > 500) actividadLog = actividadLog.slice(0, 500);
    try{ localStorage.setItem('ceamar_actividad', JSON.stringify(actividadLog)); }catch(e){}
  }
  try{ localStorage.setItem(snapshotKey, JSON.stringify(newSnap)); }catch(e){}
}

function calNavMes(dir){
  calMesVista += dir;
  if(calMesVista < 0){ calMesVista = 11; calAnioVista--; }
  if(calMesVista > 11){ calMesVista = 0; calAnioVista++; }
  calDiaSeleccionado = null;
  renderCalActividad();
}

function selCalDia(fecha){
  calDiaSeleccionado = (calDiaSeleccionado === fecha) ? null : fecha;
  renderCalActividad();
}

function renderCalActividad(){
  var panel = document.getElementById('cal-actividad-panel');
  if(!panel) return;

  var now = new Date();
  var todayKey = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  // Si no hay día seleccionado, seleccionar hoy por defecto
  if(!calDiaSeleccionado) calDiaSeleccionado = todayKey;

  var firstDay = new Date(calAnioVista, calMesVista, 1);
  var daysInMonth = new Date(calAnioVista, calMesVista+1, 0).getDate();
  var startDow = (firstDay.getDay() + 6) % 7; // 0=Lun

  var mesLabel = MESES_CAL[calMesVista].substring(0,3)+' '+calAnioVista;

  // Agrupar actividades por fecha
  var actByDate = {};
  actividadLog.forEach(function(e){
    if(!actByDate[e.fecha]) actByDate[e.fecha] = [];
    actByDate[e.fecha].push(e);
  });

  // ── Mini grilla (columna izquierda) ──
  var gridHtml = '<div class="cal-header-row">'
    +'<button class="cal-nav-btn" onclick="calNavMes(-1)">◀</button>'
    +'<span class="cal-titulo">📅 '+mesLabel+'</span>'
    +'<button class="cal-nav-btn" onclick="calNavMes(1)">▶</button>'
    +'</div>'
    +'<div class="cal-grid7">';

  ['L','M','X','J','V','S','D'].forEach(function(d){
    gridHtml += '<div class="cal-day-lbl">'+d+'</div>';
  });

  for(var i=0; i<startDow; i++){
    gridHtml += '<div class="cal-cell cal-empty"></div>';
  }

  for(var d=1; d<=daysInMonth; d++){
    var fk = calAnioVista+'-'+String(calMesVista+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var acts = actByDate[fk] || [];
    var isToday = fk === todayKey;
    var isSel = fk === calDiaSeleccionado;
    var hasAct = acts.length > 0;

    var cls = 'cal-cell';
    if(isToday) cls += ' cal-today';
    if(isSel) cls += ' cal-selected';
    else if(hasAct) cls += ' cal-has-act';

    gridHtml += '<div class="'+cls+'" onclick="selCalDia(\''+fk+'\')"><div class="cal-num">'+d+'</div>';
    if(hasAct){
      var dotTypes = acts.slice(0,3).map(function(a){ return a.tipo||'cambio'; });
      gridHtml += '<div class="cal-dot-row">';
      dotTypes.forEach(function(t){ gridHtml += '<div class="cal-dot cal-dot-'+t+'"></div>'; });
      gridHtml += '</div>';
    }
    gridHtml += '</div>';
  }
  gridHtml += '</div>'; // end cal-grid7

  // ── Detalle del día seleccionado (columna derecha) ──
  var detHtml = '';
  if(calDiaSeleccionado){
    var dActs = actByDate[calDiaSeleccionado] || [];
    var dParts = calDiaSeleccionado.split('-');
    var dDate = new Date(+dParts[0], +dParts[1]-1, +dParts[2]);
    var dLabel = DIAS_SEMANA_CAL[dDate.getDay()]+' '+dParts[2]+' de '+MESES_CAL[+dParts[1]-1];
    detHtml += '<div class="cal-detail-titulo">'+dLabel+'</div>';
    if(dActs.length){
      detHtml += '<div class="cal-act-list">';
      dActs.forEach(function(e){
        detHtml += '<div class="cal-act-entry">'
          +'<span class="cal-act-hora">'+e.hora+'</span>'
          +'<span class="cal-act-texto">'+e.texto+'</span>'
          +'</div>';
      });
      detHtml += '</div>';
    } else {
      detHtml += '<div class="cal-detail-empty">Sin actividad registrada</div>';
    }
  }

  panel.innerHTML = '<div class="cal-wrap">'
    +'<div class="cal-left">'+gridHtml+'</div>'
    +'<div class="cal-right">'+detHtml+'</div>'
    +'</div>';
}

  document.getElementById('detalle-sub').textContent=campanas.join(' · ')+' · '+mesSel+' '+anioSel;

    var esURL=/^https?:\/\//i.test(ruta);

    else rutaHtml='<button class="ruta-btn" data-ruta="'+rutaEsc+'" onclick="copiarRutaBtn(this)" title="'+rutaEsc+'">📂 Copiar ruta</button>';

function setUrgentColor(proyecto, color, el){

function renderUrgentes(){
  var panel = document.getElementById('urgentes-panel');
  if(!panel) return;
  var fd = ALL.filter(function(r){ return r.mes===mesSel && r.source===anioSel && (!r.responsable||!r.responsable.trim()); });
  if(!fd.length){ panel.innerHTML=''; return; }
  var map = {};
  fd.forEach(function(r){
    if(!map[r.proyecto]) map[r.proyecto]=[];
    map[r.proyecto].push(r.seccion);
  });
  var proyNames = Object.keys(map).sort();
  var totalSecc = fd.length;

  // Separar con color (prioritarios) de sin color
  var colorOrder = {rojo:0, amarillo:1, verde:2};
  var conColor = proyNames.filter(function(p){ return urgentesColores[p]&&urgentesColores[p]!=='ninguno'; });
  var sinColor = proyNames.filter(function(p){ return !urgentesColores[p]||urgentesColores[p]==='ninguno'; });
  // Ordenar con-color por prioridad
  conColor.sort(function(a,b){
    return (colorOrder[urgentesColores[a]]||9)-(colorOrder[urgentesColores[b]]||9);
  });

  function buildRow(p){
    var col = urgentesColores[p]||'ninguno';
    var colClass = col!=='ninguno'?' col-'+col:'';
    var seccs = map[p].map(function(s){ return '<span class="urgente-secc">'+s+'</span>'; }).join('');
    var safePU = p.replace(/'/g,"\\'");
    var colorBtns = ['rojo','amarillo','verde','ninguno'].map(function(c){
      var title = c==='rojo'?'Crítico':c==='amarillo'?'Urgente':c==='verde'?'Puede esperar':'Sin color';
      return '<button class="urgente-color-btn c-'+c+(col===c?' active':'')+'" title="'+title+'" onclick="setUrgentColor(\''+safePU+'\',\''+c+'\',this)"></button>';
    }).join('');
    return '<div class="urgente-row'+colClass+'">'
      +'<span class="urgente-proy">'+p+'</span>'
      +'<span class="urgentes-seccs">'+seccs+'</span>'
      +'<div class="urgente-color-btns">'+colorBtns+'</div>'
      +'</div>';
  }

  var rowsConColor = conColor.map(buildRow).join('');
  var rowsSinColor = sinColor.map(buildRow).join('');

  var sinColorSection = '';
  if(sinColor.length){
    sinColorSection = '<button class="urgentes-sincolor-toggle" id="urgentes-sincolor-btn" onclick="toggleUrgenteSinColor()">'
      +'Sin prioridad asignada ('+sinColor.length+') <span>'+(urgenteSinColorAbierto?'▲':'▼')+'</span></button>'
      +'<div id="urgentes-sincolor-body" style="'+(urgenteSinColorAbierto?'':'display:none;')+'">'
      +'<div class="urgentes-grid" style="margin-top:6px;">'+rowsSinColor+'</div>'
      +'</div>';
  }

  panel.innerHTML = '<div class="urgentes-wrap">'
    +'<div class="urgentes-titulo" onclick="toggleUrgentes()">'
    +'📭 Pendiente de recepción — '+mesSel+' '+anioSel+' '
    +'<span style="background:rgba(255,255,255,0.25);border-radius:20px;padding:2px 10px;font-size:11px;">'+totalSecc+' '+(totalSecc!==1?'secciones':'sección')+' · '+proyNames.length+' '+(proyNames.length!==1?'proyectos':'proyecto')+'</span>'
    +'<span class="urgentes-toggle-icon'+(urgentesAbierto?' open':'')+'" id="urgentes-icon">▼</span>'
    +'</div>'
    +'<div id="urgentes-body" style="'+(urgentesAbierto?'':'display:none;')+'">'
    +'<div class="urgentes-sub">Secciones sin responsable. <span style="opacity:.7;font-size:10px;">🔴 Crítico · 🟡 Urgente · 🟢 Puede esperar</span></div>'
    +(rowsConColor?'<div class="urgentes-grid">'+rowsConColor+'</div>':'')
    +sinColorSection
    +'</div>'
    +'</div>';
}

// ─── BÚSQUEDA HISTÓRICA ──────────────────────────────────
function renderBusqHist(){
  var panel = document.getElementById('busq-hist-panel');
  var q = (document.getElementById('search-input')||{value:''}).value.toLowerCase().trim();
  if(q.length < 2){ panel.className='busq-hist'; return; }

  // Coincidir con nombre de proyecto O nombre de cliente
  var rows = ALL.filter(function(r){
    if(!r.proyecto) return false;
    var matchProy = r.proyecto.toLowerCase().indexOf(q) >= 0;
    var matchCliente = getClienteDeProyecto(r.proyecto).toLowerCase().indexOf(q) >= 0;
    return matchProy || matchCliente;
  });
  if(!rows.length){ panel.className='busq-hist'; return; }

  // Agrupar por cliente → proyecto → año+mes → secciones
  var clienteMap = {};
  rows.forEach(function(r){
    var cliente = getClienteDeProyecto(r.proyecto) || 'Sin cliente';
    if(!clienteMap[cliente]) clienteMap[cliente] = {};
    var k = r.proyecto;
    if(!clienteMap[cliente][k]) clienteMap[cliente][k] = {};
    var mk = r.source + '|' + r.mes + '|' + (r.campanaNorm||r.campana||'');
    if(!clienteMap[cliente][k][mk]) clienteMap[cliente][k][mk] = {anio:r.source, mes:r.mes, campana:r.campanaNorm||r.campana||'', secciones:[]};
    clienteMap[cliente][k][mk].secciones.push(r);
  });

  var clienteNombres = Object.keys(clienteMap).sort();
  var totalProys = 0;
  clienteNombres.forEach(function(c){ totalProys += Object.keys(clienteMap[c]).length; });

  document.getElementById('busq-hist-title').textContent =
    'Búsqueda: "'+q+'" — '+totalProys+' proyecto'+(totalProys!==1?'s':'')+' · '+clienteNombres.length+' cliente'+(clienteNombres.length!==1?'s':'');
  document.getElementById('busq-hist-sub').textContent =
    'Resultados de todos los meses y años';

  var html = '';
  clienteNombres.forEach(function(cliente){
    var cfg = CLIENTES_CONFIG[cliente] || {};
    var clienteColor = cfg.color || 'var(--suave)';
    // Encabezado de cliente
    html += '<div style="margin-bottom:16px;">';
    html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--gris);border-radius:10px;margin-bottom:10px;">';
    if(cfg.logo){
      html += '<img src="'+cfg.logo+'" alt="'+cliente+'" style="height:22px;max-width:70px;object-fit:contain;" onerror="this.style.display=\'none\'">';
    }
    html += '<span style="font-size:13px;font-weight:700;color:'+clienteColor+';">'+cliente+'</span>';
    html += '<span style="font-size:11px;color:var(--suave);">'+Object.keys(clienteMap[cliente]).length+' proyecto'+(Object.keys(clienteMap[cliente]).length!==1?'s':'')+'</span>';
    html += '</div>';

    var proyNombres = Object.keys(clienteMap[cliente]).sort();
    proyNombres.forEach(function(nombre){
    var proyMap = clienteMap[cliente];
    var color = getPrColor(nombre);
    html += '<div class="busq-proy-block" style="margin-left:12px;border-left:3px solid '+color+';padding-left:12px;">';
    html += '<div class="busq-proy-nombre">';
    html += '<span class="busq-proy-color" style="background:'+color+';"></span>';
    html += nombre;
    html += '</div>';

    // Ordenar meses cronológicamente: 2025 primero, luego 2026; dentro de cada año por orden de MESES_ORD
    var mKeys = Object.keys(proyMap[nombre]).sort(function(a,b){
      var da = proyMap[nombre][a], db = proyMap[nombre][b];
      if(da.anio !== db.anio) return da.anio < db.anio ? -1 : 1;
      return MESES_ORD.indexOf(da.mes) - MESES_ORD.indexOf(db.mes);
    });

    mKeys.forEach(function(mk){
      var grupo = proyMap[nombre][mk];
      var comp = grupo.secciones.filter(function(s){return s.completado;}).length;
      var tot = grupo.secciones.length;
      var pct = Math.round(comp/tot*100);
      var estadoCls = pct===100?'p-ok':pct>0?'p-parcial':'p-pend';
      html += '<div class="busq-mes-group">';
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;">';
      html += '<span class="busq-mes-label">'+grupo.mes+' '+grupo.anio+'</span>';
      if(grupo.campana) html += '<span style="font-size:11px;font-weight:600;color:var(--azul-c);background:var(--azul-s);padding:2px 8px;border-radius:10px;">'+grupo.campana+'</span>';
      html += '<span class="pill '+estadoCls+'">'+comp+'/'+tot+' secciones</span>';
      var safeCamp = (grupo.campana||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      var safeNombreBtn = nombre.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      html += '<button onclick="abrirSidePanel(\''+safeNombreBtn+'\',\''+grupo.mes+'\',\''+grupo.anio+'\',\''+safeCamp+'\')" '
        + 'style="background:var(--azul-s);border:1px solid var(--azul-c);border-radius:10px;font-size:10px;'
        + 'padding:3px 10px;cursor:pointer;color:var(--azul-c);font-family:\'DM Sans\',sans-serif;font-weight:600;" '
        + 'title="Ver detalle de este mes">🔍 Ver detalle</button>';
      html += '</div>';
      grupo.secciones.forEach(function(s){
        var c = gc(s.responsable||'');
        html += '<div class="busq-secc-row">';
        html += '<span class="secc-status" style="font-size:12px;flex-shrink:0;">'+(s.completado?'✓':'○')+'</span>';
        html += '<span class="busq-secc-nombre">'+s.seccion+'</span>';
        html += '<span class="busq-secc-resp" style="flex-shrink:0;">';
        html += '<span class="av" style="width:18px;height:18px;font-size:7px;background:'+c.bg+';color:'+c.fg+';border:none;">'+ini(s.responsable||'')+'</span>';
        html += '<strong style="color:var(--texto);">'+(s.responsable||'—')+'</strong>';
        html += '</span>';
        html += '</div>';
      });
      html += '</div>';
    });
    html += '</div>';
  });
  html += '</div>';
});

  document.getElementById('busq-hist-body').innerHTML = html;
  panel.className = 'busq-hist visible';
}
function cerrarBusqHist(){
  document.getElementById('busq-hist-panel').className='busq-hist';
  document.getElementById('search-input').value='';
  render();
}

// Abre el panel lateral desde Vista Anual (cambia mes/año activo si hace falta)
function abrirSidePanelAnual(nombre, mes, anio){

  mesSel = mes;
  anioSel = anio;

  var campana = '';

     .forEach(function(r){ if(!campana) campana=r.campanaNorm||r.campana||''; });

function abrirSidePanel(nombre, mes, anio, campana){
  var rows = ALL.filter(function(r){
    return r.proyecto===nombre && r.mes===mes && r.source===anio &&
           (!campana || (r.campanaNorm||r.campana)===campana);
  });
  if(!rows.length) return;

  var color = getPrColor(nombre);
  document.getElementById('sp-titulo').textContent = nombre;

  var subHtml = '<span style="font-size:12px;font-weight:700;color:var(--suave);">'+mes+' '+anio+'</span>';
  if(campana) subHtml += '<span style="background:var(--azul-s);color:var(--azul-c);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;">'+campana+'</span>';
  var comp = rows.filter(function(r){return r.completado;}).length;
  var tot = rows.length;
  var pct = Math.round(comp/tot*100);
  var estadoCls = pct===100?'p-ok':pct>0?'p-parcial':'p-pend';
  subHtml += '<span class="pill '+estadoCls+'">'+comp+'/'+tot+' secciones</span>';
  document.getElementById('sp-sub').innerHTML = subHtml;

  var safeNombreSP = nombre.replace(/"/g,'&quot;');
  var lista = rows.map(function(s){
    var c = gc(s.responsable||'');
    var compAttr = s.completado?'true':'false';
    var seccEsc = s.seccion.replace(/"/g,'&quot;');
    return '<div class="secc-item '+(s.completado?'ok':'pend')+'" style="padding:10px 12px;gap:8px;"'
      +' data-seccion="'+seccEsc+'" data-proyecto="'+safeNombreSP+'" data-source="'+anio+'" data-mes="'+mes+'">'
      // Toggle completado
      +'<button class="toggle-comp" data-comp="'+compAttr+'" onclick="toggleCompletadoSecc(this)" title="Marcar como '+(s.completado?'pendiente':'completado')+'" style="color:'+(s.completado?'var(--verde)':'var(--suave)')+';">'+(s.completado?'✓':'○')+'</button>'
      // Nombre sección
      +'<span class="secc-nombre" style="font-size:13px;flex:1;">'+s.seccion+'</span>'
      // Responsable (editable)
      +'<span class="av av-sm" style="background:'+c.bg+';color:'+c.fg+';" title="'+( s.responsable||'Sin asignar')+'">'+ini(s.responsable||'?')+'</span>'
      +'<span class="secc-edit-field" data-field="responsable" data-valor="'+(s.responsable||'')+'" onclick="editarCampo(this)" title="Clic para editar responsable">'+(s.responsable||'—')+'</span>'
      // Responsable SMA (editable)
      +'<span style="font-size:10px;color:var(--suave);margin-left:4px;">SMA:</span>'
      +'<span class="secc-edit-field" data-field="smaResp" data-valor="'+(s.smaResp||'')+'" onclick="editarCampo(this)" title="Clic para editar responsable SMA">'+(s.smaResp||'—')+'</span>'
      +'</div>';
  }).join('');
  document.getElementById('sp-secciones').innerHTML = lista;

  // ── Historial del proyecto (todos los meses con datos) ──
  var histRows = ALL.filter(function(r){ return r.proyecto===nombre; });
  var histMap = {};
  histRows.forEach(function(r){
    var k = r.source+'|'+r.mes;
    if(!histMap[k]) histMap[k]={anio:r.source,mes:r.mes,tot:0,comp:0};
    histMap[k].tot++;
    if(r.completado) histMap[k].comp++;
  });
  var histKeys = Object.keys(histMap).sort(function(a,b){
    var da=histMap[a], db=histMap[b];
    if(da.anio!==db.anio) return da.anio<db.anio?-1:1;
    return MESES_ORD.indexOf(da.mes)-MESES_ORD.indexOf(db.mes);
  });
  var histHtml = '';
  if(histKeys.length>1){
    histHtml = '<div style="margin-top:18px;border-top:1px solid var(--borde);padding-top:14px;">'
      +'<div style="font-size:11px;font-weight:700;color:var(--suave);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;">Historial del proyecto</div>'
      +'<div style="display:flex;flex-direction:column;gap:6px;">';
    histKeys.forEach(function(k){
      var h = histMap[k];
      var pct2 = h.tot>0?Math.round(h.comp/h.tot*100):0;
      var esMesActual = (h.mes===mes && h.anio===anio);
      var barColor2 = pct2===100?'#1a5c2e':pct2>0?'#f57c00':'#e0e0e0';
      histHtml += '<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:8px;'+(esMesActual?'background:var(--azul-s);':'')+'">'
        +'<span style="font-size:11px;font-weight:600;min-width:90px;color:'+(esMesActual?'var(--azul-c)':'var(--texto)')+';">'+h.mes+' '+h.anio+'</span>'
        +'<div style="flex:1;height:6px;background:var(--gris);border-radius:3px;overflow:hidden;">'
          +'<div style="width:'+pct2+'%;height:100%;background:'+barColor2+';border-radius:3px;"></div>'
        +'</div>'
        +'<span style="font-size:11px;font-weight:700;color:var(--texto);min-width:28px;text-align:right;">'+pct2+'%</span>'
        +(esMesActual?'<span style="font-size:9px;background:var(--azul-c);color:white;border-radius:6px;padding:1px 5px;">actual</span>':'')
      +'</div>';
    });
    histHtml += '</div></div>';
  }
  document.getElementById('sp-secciones').insertAdjacentHTML('afterend', histHtml);

  // Footer: ruta si existe + botón ir al mes
  var ruta = '';
  rows.forEach(function(r){ if(r.ubicacion&&!ruta) ruta=r.ubicacion; });
  var footer = '';
  if(ruta){
    // Detectar si es URL o ruta local
    var esURL = /^https?:\/\//i.test(ruta);
    if(esURL){
      footer += '<a href="'+ruta.replace(/"/g,'&quot;')+'" target="_blank" class="ruta-btn">📂 Abrir carpeta</a>';
    } else {
      var rutaEsc2 = ruta.replace(/"/g,'&quot;');
      footer += '<button class="ruta-btn" data-ruta="'+rutaEsc2+'" onclick="copiarRutaBtn(this)" title="'+rutaEsc2+'">📂 Copiar ruta</button>';
    }
  }
  // Ruta editable inline
  var rutaEscF = (ruta||'').replace(/"/g,'&quot;');
  footer += '<span style="font-size:11px;color:var(--suave);margin-left:auto;">Ruta:</span>'
    +'<span class="secc-edit-field" data-field="ubicacion" data-valor="'+rutaEscF+'"'
    +' data-seccion="__proyecto__" data-proyecto="'+nombre.replace(/"/g,'&quot;')+'" data-source="'+anio+'" data-mes="'+mes+'"'
    +' onclick="editarCampoUbicacion(this,\''+nombre.replace(/'/g,"\\'")+'\')" title="Clic para editar ruta">'+(ruta||'—')+'</span>';
  footer += '<button onclick="cerrarSidePanel();irAMes(\''+mes+'\',\''+anio+'\')" '
    + 'style="padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--borde);'
    + 'color:var(--suave);background:none;cursor:pointer;font-family:\'DM Sans\',sans-serif;">↗ Ir al mes</button>';
  document.getElementById('sp-footer').innerHTML = footer;

  document.getElementById('side-overlay').className='side-panel-overlay open';
  setTimeout(function(){ document.getElementById('side-panel').className='side-panel open'; }, 10);
}

  document.getElementById('side-panel').className='side-panel';
  document.getElementById('side-overlay').className='side-panel-overlay';

function copiarRuta(ruta){
  try{
    navigator.clipboard.writeText(ruta).then(function(){
      var btn = document.querySelector('#sp-footer .ruta-btn') || document.querySelector('#detalle-ruta .ruta-btn');
      if(btn){ var orig=btn.textContent; btn.textContent='✓ Copiada'; setTimeout(function(){btn.textContent=orig;},2000); }
    });
  }catch(e){ prompt('Copia esta ruta:', ruta); }
}
// Versión segura para llamar desde data-attribute (evita problemas con backslashes en onclick)
function copiarRutaBtn(btn){
  copiarRuta(btn.getAttribute('data-ruta'));
}

var _toastTimer = null;
