<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avance Informes y Planillas SMA — CEAMAR</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --verde:#1a5c2e;--verde-s:#e8f5e9;--azul:#0d3d5c;--azul-c:#1565c0;--azul-s:#e3f2fd;
    --amber:#f57c00;--amber-s:#fff3e0;--rojo:#c62828;--rojo-s:#ffebee;
    --gris:#f4f6f8;--borde:#e0e0e0;--texto:#1a1a2e;--suave:#6b7280;
    --sombra:0 2px 14px rgba(0,0,0,0.07);--sombra-hover:0 8px 28px rgba(0,0,0,0.13);
    --r:14px;--bg:#f0f4f8;--card-bg:white;
  }
  [data-theme="dark"]{
    --verde:#4caf50;--verde-s:#1b3a20;--azul:#90caf9;--azul-c:#64b5f6;--azul-s:#0d2137;
    --amber:#ffb74d;--amber-s:#2d1f00;--rojo:#ef5350;--rojo-s:#2d0e0e;
    --gris:#1e2736;--borde:#2d3a4a;--texto:#e2e8f0;--suave:#94a3b8;
    --sombra:0 2px 14px rgba(0,0,0,0.35);--sombra-hover:0 8px 28px rgba(0,0,0,0.5);
    --bg:#0f1623;--card-bg:#1a2333;
  }
  [data-theme="dark"] .tabs,
  [data-theme="dark"] .fchip,
  [data-theme="dark"] .search-input,
  [data-theme="dark"] .proyecto-select,
  [data-theme="dark"] .mes-dropdown,
  [data-theme="dark"] .mes-btn,
  [data-theme="dark"] .kpi,
  [data-theme="dark"] .detalle-panel,
  [data-theme="dark"] .equipo-card,
  [data-theme="dark"] .card,
  [data-theme="dark"] .export-btn,
  [data-theme="dark"] .anio-btn,
  [data-theme="dark"] .pend-card,
  [data-theme="dark"] .resp-chip,
  [data-theme="dark"] .hist-panel,
  [data-theme="dark"] .hist-mes-header,
  [data-theme="dark"] .secc-item,
  [data-theme="dark"] .eq-row{background:var(--card-bg);color:var(--texto);}
  [data-theme="dark"] .secc-item.ok{background:var(--verde-s);}
  [data-theme="dark"] .secc-item.pend{background:var(--rojo-s);}
  [data-theme="dark"] tr:hover td,[data-theme="dark"] .anual-table tr:hover td{background:#1e2d3d;}
  [data-theme="dark"] th,[data-theme="dark"] .anual-table th{background:var(--gris);color:var(--suave);}
  [data-theme="dark"] td{border-color:var(--borde);}
  [data-theme="dark"] .tab.active{background:var(--verde);}
  [data-theme="dark"] .tab:hover{background:var(--gris);}
  [data-theme="dark"] .p-parcial{background:#283593;color:#90caf9;}
  [data-theme="dark"] .side-panel{background:var(--card-bg);}
  [data-theme="dark"] td{border-bottom-color:var(--borde) !important;}
  [data-theme="dark"] .alerta-rojo{background:var(--rojo-s);border-color:var(--rojo);color:var(--rojo);}
  [data-theme="dark"] .alerta-amber{background:var(--amber-s);border-color:var(--amber);color:var(--amber);}
  [data-theme="dark"] .alerta-verde{background:var(--verde-s);border-color:var(--verde);color:var(--verde);}
  [data-theme="dark"] .syncbar.ok{background:var(--verde-s);border-color:var(--verde);}
  [data-theme="dark"] .syncbar.err{background:var(--rojo-s);border-color:var(--rojo);}
  [data-theme="dark"] .syncbar.warn{background:var(--amber-s);border-color:var(--amber);}
  [data-theme="dark"] .syncbar.loading{background:var(--azul-s);border-color:var(--azul-c);}
  [data-theme="dark"] .busq-hist{background:var(--card-bg);}
  [data-theme="dark"] .busq-secc-row:nth-child(even){background:var(--gris);}
  [data-theme="dark"] .busq-mes-label{background:var(--gris);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--texto);min-height:100vh;font-size:14px;transition:background .3s,color .3s;}
  .header{background:linear-gradient(135deg,var(--verde) 0%,var(--azul) 100%);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
  .header-left{display:flex;align-items:center;gap:14px;}
  .logo-wrap{background:white;border-radius:10px;padding:5px 10px;display:flex;align-items:center;flex-shrink:0;}
  .logo-wrap img{height:40px;width:auto;display:block;}
  .htitle{color:white;font-size:16px;font-weight:600;}
  .hsub{color:rgba(255,255,255,0.6);font-size:11px;margin-top:2px;}
  .hright{display:flex;gap:8px;align-items:center;}
  .hbadge{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);}
  .dot{width:6px;height:6px;background:#4caf50;border-radius:50%;display:inline-block;margin-right:4px;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .alertas{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
  .alerta{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;font-size:12px;font-weight:500;flex:1;min-width:200px;}
  .alerta-rojo{background:#ffebee;border:1px solid #ef9a9a;color:#c62828;}
  .alerta-amber{background:#fff3e0;border:1px solid #ffcc80;color:#e65100;}
  .alerta-verde{background:#e8f5e9;border:1px solid #a5d6a7;color:#1a5c2e;}
  .alerta-icon{font-size:16px;flex-shrink:0;}
  .wrap{max-width:1400px;margin:0 auto;padding:22px;}
  .syncbar{border-radius:8px;padding:10px 16px;font-size:11px;display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .syncbar.ok{background:var(--verde-s);border:1px solid #a5d6a7;color:var(--verde);}
  .syncbar.err{background:var(--rojo-s);border:1px solid #ef9a9a;color:var(--rojo);}
  .syncbar.loading{background:var(--azul-s);border:1px solid #90caf9;color:var(--azul-c);}
  .syncbar.warn{background:var(--amber-s);border:1px solid #ffcc80;color:var(--amber);}
  .spin{width:14px;height:14px;border:2px solid rgba(0,0,0,0.1);border-top-color:var(--azul-c);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err-list{font-size:10px;color:var(--rojo);margin-left:8px;opacity:0.8;}
  .tabs{display:flex;gap:4px;margin-bottom:18px;background:white;padding:4px;border-radius:var(--r);box-shadow:var(--sombra);width:fit-content;}
  .tab{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:var(--suave);transition:all .2s;border:none;background:none;font-family:'DM Sans',sans-serif;}
  .tab:hover{background:var(--gris);color:var(--texto);}
  .tab.active{background:var(--verde);color:white;}
  .controles{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
  .flabel{font-size:12px;color:var(--suave);font-weight:500;}
  .fchip{padding:5px 12px;border-radius:20px;font-size:12px;border:1px solid var(--borde);cursor:pointer;background:white;color:var(--suave);transition:all .2s;font-weight:500;}
  .fchip:hover{border-color:var(--verde);color:var(--verde);}
  .fchip.on{background:var(--azul);color:white;border-color:var(--azul);}
  .search-wrap{position:relative;flex:1;min-width:180px;max-width:300px;}
  .search-input{width:100%;padding:7px 14px 7px 34px;border-radius:20px;border:1px solid var(--borde);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;background:white;color:var(--texto);}
  .search-input:focus{border-color:var(--verde);}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--suave);font-size:14px;pointer-events:none;}
  .proyecto-select{padding:7px 14px;border-radius:20px;border:1px solid var(--borde);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;background:white;color:var(--suave);cursor:pointer;max-width:220px;}
  /* SELECTOR DE MES COLAPSABLE */
  .mes-wrap{position:relative;display:inline-block;margin-bottom:16px;}
  .mes-current{display:flex;align-items:center;gap:8px;padding:7px 16px;background:var(--verde);color:white;border-radius:20px;cursor:pointer;font-size:13px;font-weight:500;border:none;font-family:'DM Sans',sans-serif;transition:background .2s;}
  .mes-current:hover{background:#155226;}
  .mes-arrow{font-size:10px;transition:transform .2s;}
  .mes-dropdown{display:none;position:absolute;top:calc(100% + 8px);left:0;background:white;border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,0.15);padding:14px;z-index:200;min-width:320px;border:1px solid var(--borde);}
  .mes-dropdown.open{display:block;}
  .mes-yr-label{font-size:10px;font-weight:700;color:var(--suave);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;}
  .mes-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
  .mes-btn{padding:4px 11px;border-radius:14px;font-size:12px;border:1px solid #a5d6a7;cursor:pointer;background:white;color:var(--suave);transition:all .2s;font-weight:500;}
  .mes-btn:hover,.mes-btn.on{background:var(--verde);color:white;border-color:var(--verde);}
  .mes-btn.a25{border-color:var(--borde);}
  .mes-btn.a25:hover,.mes-btn.a25.on{background:var(--suave);color:white;border-color:var(--suave);}
  .kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px;}
  .kpi{background:white;border-radius:var(--r);padding:15px 17px;box-shadow:var(--sombra);border-left:3px solid transparent;transition:transform .2s;}
  .kpi:hover{transform:translateY(-2px);}
  .kpi.v{border-left-color:var(--verde)}.kpi.a{border-left-color:var(--azul-c)}.kpi.am{border-left-color:var(--amber)}.kpi.r{border-left-color:var(--rojo)}.kpi.t{border-left-color:#00695c}
  .klabel{font-size:11px;color:var(--suave);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  .kval{font-size:28px;font-weight:700;line-height:1;}
  .ksub{font-size:12px;color:var(--suave);margin-top:4px;}
  .kpi{background:var(--card-bg);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sombra);border-left:3px solid transparent;transition:transform .2s,box-shadow .2s;}
  .kpi:hover{transform:translateY(-2px);box-shadow:var(--sombra-hover);}
  /* TARJETAS PROYECTO */
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .proyectos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px;margin-bottom:18px;}
  .proy-card{background:var(--card-bg);border-radius:var(--r);padding:20px;box-shadow:var(--sombra);border-left:5px solid var(--borde);transition:transform .22s,box-shadow .22s;cursor:pointer;animation:fadeUp .35s ease both;}
  .proy-card:hover{transform:translateY(-3px);box-shadow:var(--sombra-hover);}
  .proy-nombre{font-size:16px;font-weight:700;color:var(--azul);margin-bottom:5px;line-height:1.3;}
  .proy-campana{font-size:12px;color:var(--suave);margin-bottom:12px;}
  .proy-prog-wrap{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .proy-prog-bar{flex:1;height:9px;background:var(--gris);border-radius:5px;overflow:hidden;}
  .proy-prog-fill{height:100%;border-radius:5px;transition:width .7s ease;}
  .proy-prog-pct{font-size:13px;font-weight:700;color:var(--texto);width:36px;text-align:right;}
  .proy-secciones{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
  .secc-tag{padding:3px 9px;border-radius:10px;font-size:11px;font-weight:500;background:var(--gris);color:var(--suave);}
  .secc-ok{background:var(--gris);color:var(--texto);}
  .secc-pend{background:var(--gris);color:var(--suave);}
  .proy-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .proy-avatares{display:flex;gap:3px;}
  .av{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;border:2px solid white;}
  .av-sm{width:20px;height:20px;font-size:7px;}
  .pill{display:inline-block;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap;}
  .p-ok{background:var(--verde-s);color:var(--verde);}
  .p-pend{background:var(--amber-s);color:var(--amber);}
  .p-parcial{background:#e8eaf6;color:#283593;}
  .detalle-panel{background:white;border-radius:var(--r);padding:20px;box-shadow:var(--sombra);margin-bottom:18px;display:none;}
  .detalle-panel.visible{display:block;}
  .detalle-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
  .detalle-titulo{font-size:15px;font-weight:600;color:var(--azul);}
  .detalle-sub{font-size:12px;color:var(--suave);margin-top:3px;}
  .cerrar-btn{background:none;border:none;cursor:pointer;color:var(--suave);font-size:18px;padding:2px 6px;border-radius:6px;}
  .cerrar-btn:hover{background:var(--gris);}
  .secc-lista{display:flex;flex-direction:column;gap:6px;}
  .secc-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--gris);}
  .secc-item.ok{background:var(--verde-s);}
  .secc-item.pend{background:var(--rojo-s);}
  .secc-nombre{flex:1;font-size:12px;font-weight:500;}
  .secc-resp{font-size:11px;color:var(--suave);}
  .secc-status{font-size:12px;font-weight:600;width:16px;text-align:center;}
  .secc-item.ok .secc-status{color:var(--verde);}
  .secc-item.pend .secc-status{color:var(--rojo);}
  /* EQUIPO — tarjetas simples */
  .equipo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:18px;}
  .equipo-card{background:white;border-radius:var(--r);padding:18px;box-shadow:var(--sombra);border-top:3px solid transparent;}
  .equipo-card.eq-v{border-top-color:var(--verde);}
  .equipo-card.eq-a{border-top-color:var(--azul-c);}
  .equipo-card.eq-am{border-top-color:var(--amber);}
  .equipo-card.eq-r{border-top-color:var(--rojo);}
  .eq-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .eq-nombre{font-size:14px;font-weight:600;}
  .eq-stats{font-size:12px;color:var(--suave);margin-bottom:10px;}
  .eq-barra-wrap{margin-bottom:10px;}
  .eq-barra{height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;}
  .eq-barra-fill{height:100%;border-radius:3px;}
  .eq-pct{font-size:11px;color:var(--suave);margin-top:4px;text-align:right;}
  .eq-toggle{background:none;border:1px solid var(--borde);border-radius:8px;padding:5px 12px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--suave);width:100%;transition:all .2s;text-align:left;}
  .eq-toggle:hover{border-color:var(--verde);color:var(--verde);}
  .eq-detalle{display:none;margin-top:10px;border-top:1px solid var(--borde);padding-top:10px;}
  .eq-detalle.open{display:block;}
  .eq-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:11px;}
  .eq-row:last-child{border-bottom:none;}
  .eq-row-proy{flex:1;color:var(--azul);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .eq-row-secc{font-size:10px;color:var(--suave);width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .eq-row-status{flex-shrink:0;}
  /* SMA & tablas */
  .card{background:white;border-radius:var(--r);padding:18px;box-shadow:var(--sombra);}
  .ctitle{font-size:11px;font-weight:700;color:var(--suave);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--borde);}
  .twrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th{text-align:left;padding:7px 9px;font-size:10px;font-weight:700;color:var(--suave);text-transform:uppercase;border-bottom:1px solid var(--borde);white-space:nowrap;background:var(--gris);}
  td{padding:7px 9px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}tr:hover td{background:#fafafa;}
  .loading{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:14px;}
  .spin-lg{width:36px;height:36px;border:3px solid var(--borde);border-top-color:var(--verde);border-radius:50%;animation:spin .8s linear infinite;}
  .ltext{font-size:13px;color:var(--suave);}
  .tc{display:none;}.tc.on{display:block;}
  .prog-bar{height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;margin-top:3px;}
  .prog-fill{height:100%;border-radius:3px;}
  /* KPI TENDENCIA */
  .ktend{font-size:10px;margin-top:4px;font-weight:600;}
  .ktend.up{color:var(--verde);}
  .ktend.down{color:var(--rojo);}
  .ktend.eq{color:var(--suave);}
  /* EXPORTAR */
  .export-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--borde);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;background:white;color:var(--suave);transition:all .2s;font-weight:500;display:flex;align-items:center;gap:5px;}
  .export-btn:hover{border-color:var(--verde);color:var(--verde);}
  /* VISTA ANUAL */
  .anual-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .anio-btn{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--borde);cursor:pointer;background:white;color:var(--suave);transition:all .2s;}
  .anio-btn.on{background:var(--verde);color:white;border-color:var(--verde);}
  .anual-wrap{overflow-x:auto;}
  .anual-table{width:100%;border-collapse:collapse;font-size:12px;min-width:700px;}
  .anual-table th{text-align:center;padding:7px 6px;font-size:10px;font-weight:700;color:var(--suave);text-transform:uppercase;background:var(--gris);border-bottom:2px solid var(--borde);white-space:nowrap;}
  .anual-table th.th-proy{text-align:left;min-width:160px;}
  .anual-table td{padding:6px;text-align:center;border-bottom:1px solid #f0f0f0;}
  .anual-table td.td-proy{text-align:left;font-weight:600;color:var(--azul);font-size:12px;padding-left:9px;}
  .anual-table tr:hover td{background:#fafafa;}
  .anual-table tr.total-row td{background:var(--gris);font-weight:700;border-top:2px solid var(--borde);}
  .mes-dot{width:32px;height:20px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;cursor:pointer;transition:transform .15s;}
  .mes-dot:hover{transform:scale(1.15);}
  .mes-dot.ok{background:var(--verde-s);color:var(--verde);}
  .mes-dot.parcial{background:var(--amber-s);color:var(--amber);}
  .mes-dot.sin{background:#f5f5f5;color:#bbb;}
  .mes-dot.vacio{background:transparent;color:transparent;cursor:default;}
  /* PENDIENTES */
  .pend-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
  .pend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
  .pend-card{background:white;border-radius:var(--r);padding:16px;box-shadow:var(--sombra);}
  .pend-card-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .pend-nombre{font-size:14px;font-weight:600;flex:1;}
  .pend-badge{background:var(--rojo-s);color:var(--rojo);font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;}
  .pend-badge.cero{background:var(--verde-s);color:var(--verde);}
  .pend-lista{display:flex;flex-direction:column;gap:5px;}
  .pend-item{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;border-radius:7px;background:var(--rojo-s);font-size:11px;}
  .pend-item-icon{color:var(--rojo);font-size:12px;flex-shrink:0;margin-top:1px;}
  .pend-item-text{flex:1;}
  .pend-item-proy{font-weight:600;color:var(--azul);}
  .pend-item-secc{color:var(--suave);}
  .pend-empty{padding:12px 8px;font-size:12px;color:var(--verde);text-align:center;}
  /* DÍAS RESTANTES */
  .dias-badge{background:rgba(255,255,255,0.15);color:white;font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid rgba(255,255,255,0.25);font-weight:600;}

<script>
// ─── CONFIG ──────────────────────────────────────────────
var S25 = '1U7iVGcQ0C1YqNeZak1rV4ld5P9XTsOjWxybkBvw5aXg';
var S26 = '1hIBPoAE-zdTFc8v4ZMx0K9bzGTufOF_4nD8ERu4i7PM';
var HOJAS_2025 = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
// 2026: cargar solo hasta el mes actual para no hacer fetches innecesarios
var HOJAS_2026 = (function(){
  var mesActual = new Date().getMonth(); // 0=Enero … 11=Diciembre
  return ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'].slice(0, mesActual + 1);
})();
var MESES_ORD  = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
var CACHE_TTL  = 15 * 60 * 1000; // 15 minutos

// Solo estos 4 aparecen en la pestaña Equipo (Rocío normalizado a Rocio)
var RESP_EQUIPO = ['Tamara','Nathalie','Abigail','Rocio'];
var EQ_COLORS   = ['eq-v','eq-a','eq-am','eq-r'];

var COLS = [{bg:'#e3f2fd',fg:'#1565c0'},{bg:'#e8f5e9',fg:'#1a5c2e'},{bg:'#fff3e0',fg:'#e65100'},
            {bg:'#fce4ec',fg:'#c62828'},{bg:'#e8eaf6',fg:'#283593'},{bg:'#e0f2f1',fg:'#00695c'},
            {bg:'#f3e5f5',fg:'#6a1b9a'},{bg:'#fff8e1',fg:'#f57f17'}];
var cmap = {}, ci = 0;

// ─── UTILIDADES ──────────────────────────────────────────
function gc(n){if(!n)return COLS[0];var k=n.trim();if(!cmap[k]){cmap[k]=COLS[ci%COLS.length];ci++;}return cmap[k];}
function ini(n){if(!n||!n.trim())return'?';var p=n.trim().split(' ');return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n.substring(0,2).toUpperCase();}
function pill(t,c){return '<span class="pill '+c+'">'+t+'</span>';}

// Paleta de color por proyecto (border-left accent)
var PROY_PALETTE = ['#1565c0','#2e7d32','#e65100','#6a1b9a','#00695c','#c62828','#0277bd','#f57f17','#558b2f','#283593','#00838f','#6d4c41'];
var proyColorMap = {}, proyColorIdx = 0;
function getPrColor(nombre){ if(!nombre) return PROY_PALETTE[0]; var k=nombre.trim(); if(!proyColorMap[k]){proyColorMap[k]=PROY_PALETTE[proyColorIdx%PROY_PALETTE.length];proyColorIdx++;} return proyColorMap[k]; }

// Tamaño de fuente (zoom sobre el contenido)
var ZOOM_LEVELS = [0.85, 1, 1.15, 1.3, 1.5];
var zoomIdx = 1;
function cambiarFuente(dir){
  zoomIdx = Math.max(0, Math.min(ZOOM_LEVELS.length-1, zoomIdx+dir));
  document.querySelector('.wrap').style.zoom = ZOOM_LEVELS[zoomIdx];
  try{ localStorage.setItem('ceamar_zoom', zoomIdx); }catch(e){}
}
document.addEventListener('DOMContentLoaded',function(){
  try{
    var zi = parseInt(localStorage.getItem('ceamar_zoom'));
    if(!isNaN(zi) && zi>=0 && zi<ZOOM_LEVELS.length){ zoomIdx=zi; document.querySelector('.wrap').style.zoom=ZOOM_LEVELS[zoomIdx]; }
  }catch(e){}
});

// Dark mode
function toggleDark(){
  var isDark = document.body.getAttribute('data-theme')==='dark';
  document.body.setAttribute('data-theme', isDark?'':'dark');
  document.getElementById('dark-btn').textContent = isDark?'🌙':'☀️';
  try{localStorage.setItem('ceamar_theme', isDark?'light':'dark');}catch(e){}
}
document.addEventListener('DOMContentLoaded',function(){ try{ if(localStorage.getItem('ceamar_theme')==='dark'){ document.body.setAttribute('data-theme','dark'); var b=document.getElementById('dark-btn'); if(b)b.textContent='☀️'; } }catch(e){} });

// Normaliza tildes (Rocío → Rocio, etc.)
function normStr(s){return s?s.normalize('NFD').replace(/[̀-ͯ]/g,''):''; }

// Compara ignorando tilde
function matchEquipo(name){
  var n = normStr(name).toLowerCase();
  return RESP_EQUIPO.some(function(r){ return normStr(r).toLowerCase() === n; });
}

// Nombre canónico del equipo (para agrupar Rocio/Rocío bajo un mismo key)
function canonEquipo(name){
  var n = normStr(name).toLowerCase();
  for(var i=0;i<RESP_EQUIPO.length;i++){
    if(normStr(RESP_EQUIPO[i]).toLowerCase() === n) return RESP_EQUIPO[i];
  }
  return name;
}

// ─── CACHÉ localStorage ───────────────────────────────────
function getCached(key){
  try{
    var item = localStorage.getItem(key);
    if(!item) return null;
    var p = JSON.parse(item);
    if(Date.now() - p.ts > CACHE_TTL){ localStorage.removeItem(key); return null; }
    return p.data;
  }catch(e){ return null; }
}
function setCached(key, data){
  try{ localStorage.setItem(key, JSON.stringify({ts:Date.now(), data:data})); }catch(e){}
}

// ─── ESTADO GLOBAL ───────────────────────────────────────
var ALL = [], camp = 'Todas', mesSel = '', anioSel = '2026', respFiltro = '';

// ─── FETCH con caché ──────────────────────────────────────
function fetchSheet(id, sheetName, source){
  var cacheKey = 'ceamar3_' + source + '_' + sheetName;
  var cached = getCached(cacheKey);
  if(cached){ return Promise.resolve(cached); }

  var url = 'https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(sheetName)+'&headers=1';
  return fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(txt){
      var m = txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
      if(!m) return [];
      var json = JSON.parse(m[1]);
      if(!json.table||!json.table.rows||!json.table.rows.length) return [];

      // Detectar columnas por nombre de encabezado (robusto ante cambios de orden)
      var cols = json.table.cols || [];
      function nrm(s){ return s?String(s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim():''; }
      function findCol(keywords, exclude, fallback){
        exclude = exclude||[];
        for(var i=0;i<cols.length;i++){
          var lbl=nrm(cols[i].label);
          if(!lbl) continue;
          var hit=keywords.some(function(k){return lbl.indexOf(k)>=0;});
          var bad=exclude.some(function(k){return lbl.indexOf(k)>=0;});
          if(hit&&!bad) return i;
        }
        return fallback;
      }
      var iP  = findCol(['proyecto'],              [],      0);
      var iC  = findCol(['campana'],               ['norm'],1);
      var iS  = findCol(['secc'],                  [],      2);
      var iR  = findCol(['responsable','resp'],    ['sma'], 3);
      var iDo = findCol(['complet','entregad','hecho','listo'],[], 4);
      var iU  = findCol(['ubic','ruta','carpeta','path'],   [], 5);
      var iSMA= findCol(['sma'],                   [],      6);
      var iCN = findCol(['norm'],                  [],      7);
      var iA  = findCol(['ano','year','anio'],      [],      8);

      var rows=[], pA='', cA='', cnA='', aA='';
      json.table.rows.forEach(function(row){
        if(!row.c) return;
        function cv(i){
          if(i<0||i>=row.c.length)return'';
          var c=row.c[i];
          if(!c)return'';
          if(typeof c.v==='boolean')return c.v;
          return c.v==null?'':c.v;
        }
        var proyecto    = String(cv(iP) ||'').trim();
        var campana     = String(cv(iC) ||'').trim();
        var seccion     = String(cv(iS) ||'').trim();
        var responsable = String(cv(iR) ||'').trim();
        var completado  = (cv(iDo)===true||String(cv(iDo)).toUpperCase()==='TRUE');
        var ubicacion   = String(cv(iU) ||'').trim();
        var smaResp     = String(cv(iSMA)||'').trim();
        var campaNorm   = String(cv(iCN) ||'').trim();
        var anio        = cv(iA)?String(cv(iA)).trim():'';
        if(proyecto)  pA=proyecto;
        if(campana)   cA=campana;
        if(campaNorm) cnA=campaNorm;
        if(anio)      aA=anio;
        if(!seccion)  return;
        rows.push({proyecto:pA,campana:cA,campanaNorm:cnA,anio:aA||source,
                   seccion:seccion,responsable:responsable,completado:completado,
                   ubicacion:ubicacion,smaResp:smaResp,mes:sheetName,source:source});
      });
      setCached(cacheKey, rows);
      return rows;
    })
    .catch(function(){ return null; }); // null = error
}

// ─── CARGA PRINCIPAL ─────────────────────────────────────
function cargar(){
  var now = new Date();
  var curMes = MESES_ORD[now.getMonth()];

  // Construir lista de tareas, priorizando mes actual
  var tasks = [];
  HOJAS_2025.forEach(function(mes){ tasks.push({id:S25,mes:mes,source:'2025'}); });
  HOJAS_2026.forEach(function(mes){ tasks.push({id:S26,mes:mes,source:'2026'}); });

  tasks.sort(function(a,b){
    var ap = (a.mes===curMes)?0:1, bp = (b.mes===curMes)?0:1;
    return ap - bp;
  });

  var total = tasks.length, done = 0, errors = [];
  var primerRenderHecho = false;

  var promises = tasks.map(function(task){
    return fetchSheet(task.id, task.mes, task.source).then(function(rows){
      done++;
      if(rows === null){
        errors.push(task.source+' '+task.mes);
        rows = [];
      }
      ALL = ALL.concat(rows);
      document.getElementById('stxt').textContent = 'Cargando... '+done+'/'+total+' hojas';

      // Render anticipado al terminar el mes actual (las primeras 2 tareas)
      if(!primerRenderHecho && done >= Math.min(2, total)){
        primerRenderHecho = true;
        var rec = detectRec(); mesSel=rec.mes; anioSel=rec.anio;
        buildSel(); buildProyectoSelect(); render(); renderAlertas(); renderEquipo(); renderSMA(); renderPendientes(); renderAnual();
      }
    });
  });

  Promise.all(promises).then(function(){
    var now2 = new Date();
    if(!mesSel){ var rec=detectRec(); mesSel=rec.mes; anioSel=rec.anio; }
    buildSel(); buildProyectoSelect(); render(); renderAlertas(); renderEquipo(); renderSMA(); renderPendientes(); renderAnual();
    document.getElementById('fhdr').textContent = now2.toLocaleDateString('es-CL',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

    var errTxt = errors.length ? ' · '+errors.length+' hoja'+(errors.length>1?'s':'')+' con error' : '';
    document.getElementById('sbar').className = 'syncbar '+(errors.length?'warn':'ok');
    document.getElementById('stxt').textContent =
      '✓ Sincronizado · '+ALL.length+' secciones · '+mesSel+' '+anioSel+' · '+now2.toLocaleTimeString('es-CL')+errTxt;
    if(errors.length){
      document.getElementById('stxt').insertAdjacentHTML('afterend',
        '<span class="err-list">Errores: '+errors.join(', ')+'</span>');
    }
  });
}

// ─── AGRUPACIÓN POR PROYECTO (deduplicado por nombre) ────
function getProy(rows){
  var map = {};
  rows.forEach(function(r){
    // Clave solo por nombre: agrupa todas las campañas del mismo proyecto
    var k = r.proyecto;
    if(!map[k]) map[k]={proyecto:r.proyecto,campanas:[],campanaNorms:[],mes:r.mes,source:r.source,
                         secciones:[],resp:[],sma:[]};
    map[k].secciones.push(r);
    if(r.campana&&map[k].campanas.indexOf(r.campana)<0) map[k].campanas.push(r.campana);
    // Acumular nombres normalizados únicos (Verano, Invierno, etc.)
    var cn=r.campanaNorm||r.campana;
    if(cn&&map[k].campanaNorms.indexOf(cn)<0) map[k].campanaNorms.push(cn);
    if(r.responsable&&map[k].resp.indexOf(r.responsable)<0) map[k].resp.push(r.responsable);
    if(r.smaResp&&map[k].sma.indexOf(r.smaResp)<0) map[k].sma.push(r.smaResp);
  });
  return Object.keys(map).map(function(k){
    var p=map[k],tot=p.secciones.length,comp=p.secciones.filter(function(s){return s.completado;}).length;
    return Object.assign({},p,{campana:p.campanaNorms.join(' · '),
                                tot:tot,comp:comp,pct:tot>0?Math.round(comp/tot*100):0,done:comp===tot});
  });
}

// ─── DETECTAR MES ACTUAL DEL CALENDARIO ──────────────────
function detectRec(){
  var now = new Date();
  var mesCal = MESES_ORD[now.getMonth()];
  var anioCal = String(now.getFullYear());

  // 1. Intentar el mes actual del calendario (aunque la hoja esté vacía, es el correcto)
  if(ALL.some(function(r){return r.source===anioCal;}) || anioCal==='2026'){
    return{mes:mesCal, anio:anioCal};
  }
  // 2. Si no hay datos del año actual, buscar el mes más reciente con datos
  var i;
  for(i=MESES_ORD.length-1;i>=0;i--){
    if(ALL.some(function(r){return r.mes===MESES_ORD[i]&&r.source==='2026';}))
      return{mes:MESES_ORD[i],anio:'2026'};
  }
  for(i=MESES_ORD.length-1;i>=0;i--){
    if(ALL.some(function(r){return r.mes===MESES_ORD[i]&&r.source==='2025';}))
      return{mes:MESES_ORD[i],anio:'2025'};
  }
  return{mes:mesCal,anio:'2026'};
}

function renderAlertas(){
  var fd=ALL.filter(function(r){return r.mes===mesSel&&r.source===anioSel;});
  var proyectos=getProy(fd);
  var sinIniciar=proyectos.filter(function(p){return p.comp===0;}).length;
  var pendientes=proyectos.filter(function(p){return !p.done;}).length;
  var completos =proyectos.filter(function(p){return p.done;}).length;
  var alertas='';
  if(sinIniciar>0)
    alertas+='<div class="alerta alerta-rojo"><span class="alerta-icon">🔴</span><div><strong>'+sinIniciar+' proyecto'+(sinIniciar>1?'s':'')+' sin iniciar</strong><br>Requieren atención inmediata</div></div>';
  if(pendientes>0)
    alertas+='<div class="alerta alerta-amber"><span class="alerta-icon">🟡</span><div><strong>'+pendientes+' proyecto'+(pendientes>1?'s':'')+' pendiente'+(pendientes>1?'s':'')+' de entrega</strong><br>en '+mesSel+' '+anioSel+'</div></div>';
  if(completos>0&&pendientes===0)
    alertas+='<div class="alerta alerta-verde"><span class="alerta-icon">✅</span><div><strong>¡Todos los proyectos completados!</strong><br>Excelente trabajo del equipo</div></div>';

}

// ─── TENDENCIA ───────────────────────────────────────────
function tendencia(valActual, total, mesComp, anioComp){
  if(!mesComp||!anioComp) return '';
  var fdPrev=ALL.filter(function(r){return r.mes===mesComp&&r.source===anioComp;});
  if(!fdPrev.length) return '';
  var pPrev=getProy(fdPrev);
  var tPrev=pPrev.length, cPrev=pPrev.filter(function(p){return p.done;}).length;
  var pctPrev=tPrev>0?Math.round(cPrev/tPrev*100):0;
  var pctAct=total>0?Math.round(valActual/total*100):0;
  var diff=pctAct-pctPrev;
  if(diff>0) return '<div class="ktend up">▲ +'+diff+'% vs '+mesComp.substring(0,3)+' '+anioComp+'</div>';
  if(diff<0) return '<div class="ktend down">▼ '+diff+'% vs '+mesComp.substring(0,3)+' '+anioComp+'</div>';
  return '<div class="ktend eq">= igual vs '+mesComp.substring(0,3)+' '+anioComp+'</div>';
}

// ─── RENDER PROYECTOS ────────────────────────────────────
function render(){
  renderUrgentes();
  var fd=getF(), proyectos=getProy(fd);
  var tP=proyectos.length,cP=proyectos.filter(function(p){return p.done;}).length,peP=tP-cP;
  var pct=tP>0?Math.round(cP/tP*100):0;
  var allR=[];fd.forEach(function(r){if(r.responsable&&allR.indexOf(r.responsable)<0)allR.push(r.responsable);});
  // Planilla SMA incompleta = alguna sección no tiene smaResp
  var sinSMA=proyectos.filter(function(p){
    return p.secciones.some(function(s){ return !s.smaResp||!s.smaResp.trim(); });
  }).length;

  // Año de comparación: si vemos 2026 → comparar con 2025, si 2025 → sin comparación
  var anioComp=anioSel==='2026'?'2025':null;
  var tend=anioComp?tendencia(cP,tP,mesSel,anioComp):'';

  document.getElementById('kgrid').innerHTML=
    '<div class="kpi a"><div class="klabel">Proyectos</div><div class="kval">'+tP+'</div><div class="ksub">'+mesSel+' '+anioSel+'</div></div>'+
    '<div class="kpi v"><div class="klabel">Completados</div><div class="kval">'+cP+'</div><div class="ksub">'+pct+'%</div>'+tend+'</div>'+
    '<div class="kpi am"><div class="klabel">Pendientes</div><div class="kval">'+peP+'</div><div class="ksub">'+(100-pct)+'%</div></div>'+
    '<div class="kpi t"><div class="klabel">Responsables</div><div class="kval">'+allR.length+'</div><div class="ksub">activos</div></div>'+
    '<div class="kpi r"><div class="klabel">Planilla SMA incompleta</div><div class="kval">'+sinSMA+'</div><div class="ksub">con secc. sin asignar</div></div>';

  if(!proyectos.length){
    document.getElementById('proyectos-grid').innerHTML='<div style="padding:40px;color:var(--suave);text-align:center;grid-column:1/-1;">No se encontraron proyectos con los filtros actuales.</div>';
    return;
  }
  var cards=proyectos.map(function(p){
    var clase=p.done?'completo':p.comp>0?'parcial':'sin-iniciar';
    var color=p.done?'#1a5c2e':p.comp>0?'#f57c00':'#e0e0e0';
    var seccTags=p.secciones.map(function(s){
      return '<span class="secc-tag '+(s.completado?'secc-ok':'secc-pend')+'">'+(s.completado?'✓ ':'')+s.seccion+'</span>';
    }).join('');
    var avatares=p.resp.slice(0,4).map(function(r){
      var c=gc(r);return '<span class="av av-sm" style="background:'+c.bg+';color:'+c.fg+';" title="'+r+'">'+ini(r)+'</span>';
    }).join('');
    var estadoPill=p.done?pill('✓ Completo','p-ok'):p.comp>0?pill(p.comp+'/'+p.tot+' secc.','p-parcial'):pill('Sin iniciar','p-pend');
    var safeNombre=p.proyecto.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return '<div class="proy-card '+clase+'" style="border-left-color:'+getPrColor(p.proyecto)+';" onclick="verDetalle(\''+safeNombre+'\')">'+
      '<div class="proy-nombre">'+p.proyecto+'</div>'+
      '<div class="proy-campana">'+p.campana+' · '+p.mes+' '+p.source+'</div>'+
      '<div class="proy-prog-wrap">'+
        '<div class="proy-prog-bar"><div class="proy-prog-fill" style="width:'+p.pct+'%;background:'+color+';"></div></div>'+
        '<div class="proy-prog-pct">'+p.pct+'%</div>'+
      '</div>'+
      '<div class="proy-secciones">'+seccTags+'</div>'+
      '<div class="proy-footer"><div class="proy-avatares">'+avatares+'</div>'+estadoPill+
      '<button style="background:none;border:none;cursor:pointer;font-size:10px;color:var(--suave);padding:2px 6px;border-radius:6px;transition:color .2s;" '+
        'onmouseover="this.style.color=\'var(--azul-c)\'" onmouseout="this.style.color=\'var(--suave)\'" '+
        'onclick="event.stopPropagation();verHistorial(\''+safeNombre+'\')" title="Ver historial">📋 Historial</button>'+

  document.getElementById('proyectos-grid').innerHTML=cards;

    var esURL=/^https?:\/\//i.test(ruta);

  var panel=document.getElementById('detalle-panel');

  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function renderUrgentes(){

  var fd = ALL.filter(function(r){ return r.mes===mesSel && r.source===anioSel && (!r.responsable||!r.responsable.trim()); });

function renderBusqHist(){

  var q = (document.getElementById('search-input')||{value:''}).value.toLowerCase().trim();
  if(q.length < 2){ panel.className='busq-hist'; return; }

  // Todos los registros que coincidan con la búsqueda (todos los años/meses)
  var rows = ALL.filter(function(r){ return r.proyecto && r.proyecto.toLowerCase().indexOf(q) >= 0; });
  if(!rows.length){ panel.className='busq-hist'; return; }

  // Agrupar por proyecto → año+mes → secciones
  var proyMap = {};
  rows.forEach(function(r){
    var k = r.proyecto;
    if(!proyMap[k]) proyMap[k] = {};
    var mk = r.source + '|' + r.mes + '|' + (r.campanaNorm||r.campana||'');
    if(!proyMap[k][mk]) proyMap[k][mk] = {anio:r.source, mes:r.mes, campana:r.campanaNorm||r.campana||'', secciones:[]};
    proyMap[k][mk].secciones.push(r);
  });

  var proyNombres = Object.keys(proyMap).sort();
  var totalMeses = 0;
  proyNombres.forEach(function(p){ totalMeses += Object.keys(proyMap[p]).length; });

  document.getElementById('busq-hist-title').textContent =
    'Historial: "'+q+'" — '+proyNombres.length+' proyecto'+(proyNombres.length!==1?'s':'')+' encontrado'+(proyNombres.length!==1?'s':'');
  document.getElementById('busq-hist-sub').textContent =
    totalMeses+' aparición'+(totalMeses!==1?'es':'')+' en total a través de todos los meses y años';

  var html = '';
  proyNombres.forEach(function(nombre){
    var color = getPrColor(nombre);
    html += '<div class="busq-proy-block">';
    html += '<div class="busq-proy-nombre">';
    html += '<span class="busq-proy-color" style="background:'+color+';"></span>';
    html += nombre;
    html += '</div>';

    // Ordenar meses cronológicamente: 2025 primero, luego 2026; dentro de cada año por orden de MESES_ORD
    var mKeys = Object.keys(proyMap[nombre]).sort(function(a,b){
      var da = proyMap[nombre][a], db = proyMap[nombre][b];
      if(da.anio !== db.anio) return da.anio < db.anio ? -1 : 1;
      return MESES_ORD.indexOf(da.mes) - MESES_ORD.indexOf(db.mes);
    });

    mKeys.forEach(function(mk){
      var grupo = proyMap[nombre][mk];
      var comp = grupo.secciones.filter(function(s){return s.completado;}).length;
      var tot = grupo.secciones.length;
      var pct = Math.round(comp/tot*100);
      var estadoCls = pct===100?'p-ok':pct>0?'p-parcial':'p-pend';
      html += '<div class="busq-mes-group">';
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;">';
      html += '<span class="busq-mes-label">'+grupo.mes+' '+grupo.anio+'</span>';
      if(grupo.campana) html += '<span style="font-size:11px;font-weight:600;color:var(--azul-c);background:var(--azul-s);padding:2px 8px;border-radius:10px;">'+grupo.campana+'</span>';
      html += '<span class="pill '+estadoCls+'">'+comp+'/'+tot+' secciones</span>';
      var safeCamp = (grupo.campana||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      var safeNombreBtn = nombre.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      html += '<button onclick="abrirSidePanel(\''+safeNombreBtn+'\',\''+grupo.mes+'\',\''+grupo.anio+'\',\''+safeCamp+'\')" '
        + 'style="background:var(--azul-s);border:1px solid var(--azul-c);border-radius:10px;font-size:10px;'
        + 'padding:3px 10px;cursor:pointer;color:var(--azul-c);font-family:\'DM Sans\',sans-serif;font-weight:600;" '
        + 'title="Ver detalle de este mes">🔍 Ver detalle</button>';
      html += '</div>';
      grupo.secciones.forEach(function(s){
        var c = gc(s.responsable||'');
        html += '<div class="busq-secc-row">';
        html += '<span class="secc-status" style="font-size:12px;flex-shrink:0;">'+(s.completado?'✓':'○')+'</span>';
        html += '<span class="busq-secc-nombre">'+s.seccion+'</span>';
        html += '<span class="busq-secc-resp" style="flex-shrink:0;">';
        html += '<span class="av" style="width:18px;height:18px;font-size:7px;background:'+c.bg+';color:'+c.fg+';border:none;">'+ini(s.responsable||'')+'</span>';
        html += '<strong style="color:var(--texto);">'+(s.responsable||'—')+'</strong>';
        html += '</span>';
        html += '</div>';
      });
      html += '</div>';
    });
    html += '</div>';
  });

  document.getElementById('busq-hist-body').innerHTML = html;
  panel.className = 'busq-hist visible';
}
function cerrarBusqHist(){
  document.getElementById('busq-hist-panel').className='busq-hist';
  document.getElementById('search-input').value='';
  render();
}

// ─── PANEL LATERAL ───────────────────────────────────────
function abrirSidePanel(nombre, mes, anio, campana){
  var rows = ALL.filter(function(r){
    return r.proyecto===nombre && r.mes===mes && r.source===anio &&
           (!campana || (r.campanaNorm||r.campana)===campana);
  });
  if(!rows.length) return;

  var color = getPrColor(nombre);
  document.getElementById('sp-titulo').textContent = nombre;

  var subHtml = '<span style="font-size:12px;font-weight:700;color:var(--suave);">'+mes+' '+anio+'</span>';
  if(campana) subHtml += '<span style="background:var(--azul-s);color:var(--azul-c);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;">'+campana+'</span>';
  var comp = rows.filter(function(r){return r.completado;}).length;
  var tot = rows.length;
  var pct = Math.round(comp/tot*100);
  var estadoCls = pct===100?'p-ok':pct>0?'p-parcial':'p-pend';
  subHtml += '<span class="pill '+estadoCls+'">'+comp+'/'+tot+' secciones</span>';
  document.getElementById('sp-sub').innerHTML = subHtml;

  var lista = rows.map(function(s){
    var c = gc(s.responsable);
    return '<div class="secc-item '+(s.completado?'ok':'pend')+'" style="padding:10px 12px;">'
      +'<span class="secc-status">'+(s.completado?'✓':'○')+'</span>'
      +'<span class="secc-nombre" style="font-size:13px;">'+s.seccion+'</span>'
      +'<span class="av av-sm" style="background:'+c.bg+';color:'+c.fg+';" title="'+s.responsable+'">'+ini(s.responsable)+'</span>'
      +'<span class="secc-resp" style="font-size:12px;font-weight:600;color:var(--texto);">'+s.responsable+'</span>'
      +'</div>';
  }).join('');
  document.getElementById('sp-secciones').innerHTML = lista;

  // Footer: ruta si existe + botón ir al mes
  var ruta = '';
  rows.forEach(function(r){ if(r.ubicacion&&!ruta) ruta=r.ubicacion; });
  var footer = '';
  if(ruta){
    // Detectar si es URL o ruta local
    var esURL = /^https?:\/\//i.test(ruta);
    if(esURL){
      footer += '<a href="'+ruta.replace(/"/g,'&quot;')+'" target="_blank" class="ruta-btn">📂 Abrir carpeta</a>';
    } else {
      var rutaEsc2 = ruta.replace(/"/g,'&quot;');
      footer += '<button class="ruta-btn" data-ruta="'+rutaEsc2+'" onclick="copiarRutaBtn(this)" title="'+rutaEsc2+'">📂 Copiar ruta</button>';
    }
  }
  footer += '<button onclick="cerrarSidePanel();irAMes(\''+mes+'\',\''+anio+'\')" '
    + 'style="padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--borde);'
    + 'color:var(--suave);background:none;cursor:pointer;font-family:\'DM Sans\',sans-serif;">↗ Ir al mes</button>';
  document.getElementById('sp-footer').innerHTML = footer;

  document.getElementById('side-overlay').className='side-panel-overlay open';
  setTimeout(function(){ document.getElementById('side-panel').className='side-panel open'; }, 10);
}
function cerrarSidePanel(){
  document.getElementById('side-panel').className='side-panel';
  document.getElementById('side-overlay').className='side-panel-overlay';
}
function copiarRuta(ruta){
  try{
    navigator.clipboard.writeText(ruta).then(function(){
      var btn = document.querySelector('#sp-footer .ruta-btn') || document.querySelector('#detalle-ruta .ruta-btn');
      if(btn){ var orig=btn.textContent; btn.textContent='✓ Copiada'; setTimeout(function(){btn.textContent=orig;},2000); }
    });
  }catch(e){ prompt('Copia esta ruta:', ruta); }
}
// Versión segura para llamar desde data-attribute (evita problemas con backslashes en onclick)
function copiarRutaBtn(btn){
  copiarRuta(btn.getAttribute('data-ruta'));
}

// ─── EQUIPO ───────────────────────────────────────────────
// Solo Tamara, Nathalie, Abigail, Rocio (normalizados)
function renderEquipo(){
  var fd = ALL.filter(function(r){ return r.mes===mesSel && r.source===anioSel; });

  // Agrupar por nombre canónico del equipo
  var byR = {};
  RESP_EQUIPO.forEach(function(n){ byR[n]={t:0,c:0,rows:[]}; });

  fd.forEach(function(r){
    if(!r.responsable) return;
    if(!matchEquipo(r.responsable)) return;
    var canon = canonEquipo(r.responsable);
    byR[canon].t++;
    if(r.completado) byR[canon].c++;
    byR[canon].rows.push(r);
  });

  var cards = RESP_EQUIPO.map(function(nombre, idx){
    var v = byR[nombre];
    var c = gc(nombre);
    var colorClass = EQ_COLORS[idx % EQ_COLORS.length];
    var pct = v.t > 0 ? Math.round(v.c/v.t*100) : 0;
    var fillColor = pct===100?'#1a5c2e':pct>=50?'#f57c00':'#c62828';

    // Filas del desplegable — solo secciones completadas, ordenadas por proyecto
    var completadas = v.rows.filter(function(r){ return r.completado; });
    var pendientes  = v.rows.filter(function(r){ return !r.completado; });
    var allRows     = completadas.concat(pendientes);

    var detalleRows = allRows.map(function(r){
      return '<div class="eq-row">'+
        '<span class="eq-row-status">'+(r.completado?pill('✓','p-ok'):pill('Pend.','p-pend'))+'</span>'+
        '<span class="eq-row-proy" title="'+r.proyecto+'">'+r.proyecto+'</span>'+
        '<span class="eq-row-secc" title="'+r.seccion+'">'+r.seccion+'</span>'+
      '</div>';
    }).join('');

    var btnLabel = v.t > 0
      ? 'Ver '+v.t+' sección'+(v.t!==1?'es':'')+' ▾'
      : 'Sin secciones asignadas';

    return '<div class="equipo-card '+colorClass+'">'+
      '<div class="eq-header">'+
        '<span class="av" style="background:'+c.bg+';color:'+c.fg+';">'+ini(nombre)+'</span>'+
        '<div class="eq-nombre">'+nombre+'</div>'+
      '</div>'+
      '<div class="eq-stats">'+v.c+' de '+v.t+' secciones completadas</div>'+
      '<div class="eq-barra-wrap">'+
        '<div class="eq-barra"><div class="eq-barra-fill" style="width:'+pct+'%;background:'+fillColor+';"></div></div>'+
        '<div class="eq-pct">'+pct+'%</div>'+
      '</div>'+
      (v.t > 0 ?
        '<button class="eq-toggle" onclick="toggleEquipoDetalle(this)">'+btnLabel+'</button>'+
        '<div class="eq-detalle">'+detalleRows+'</div>'
      : '') +
    '</div>';
  }).join('');

  document.getElementById('equipo-grid').innerHTML = cards ||
    '<div style="padding:20px;color:var(--suave);">Sin datos para '+mesSel+' '+anioSel+'.</div>';
}

function toggleEquipoDetalle(btn){
  var panel = btn.nextElementSibling;
  var isOpen = panel.classList.contains('open');
  panel.classList.toggle('open');
  var nombre = btn.closest('.equipo-card').querySelector('.eq-nombre').textContent;
  var total  = btn.closest('.equipo-card').querySelector('.eq-stats').textContent.match(/(\d+) de (\d+)/);
  btn.textContent = isOpen
    ? 'Ver '+(total?total[2]:'')+ ' sección'+(total&&total[2]!=='1'?'es':'')+' ▾'
    : 'Ocultar ▴';
}

// ─── SMA ─────────────────────────────────────────────────
function renderSMA(){
  var fd = ALL.filter(function(r){ return r.mes===mesSel && r.source===anioSel; });
  if(!fd.length){
    document.getElementById('sma-content').innerHTML='<div style="padding:40px;color:var(--suave);text-align:center;">Sin datos para '+mesSel+' '+anioSel+'.</div>';
    return;
  }

  // Agrupar secciones por proyecto
  var proyMap = {};
  fd.forEach(function(r){
    var k = r.proyecto;
    if(!proyMap[k]) proyMap[k]={proyecto:k, campana:r.campanaNorm||r.campana||'', secciones:[], color:getPrColor(k)};
    proyMap[k].secciones.push(r);
  });

  var proyectos = Object.keys(proyMap).sort().map(function(k){ return proyMap[k]; });

  // Para cada proyecto: sección completa SMA = tiene smaResp no vacío
  var totalCompletas=0, totalSecciones=0;
  proyectos.forEach(function(p){
    p.seccConSMA = p.secciones.filter(function(s){ return s.smaResp && s.smaResp.trim(); }).length;
    p.seccTotal  = p.secciones.length;
    p.smaCompleto = p.seccConSMA === p.seccTotal;
    p.smaPct = p.seccTotal > 0 ? Math.round(p.seccConSMA/p.seccTotal*100) : 0;
    totalCompletas += p.seccConSMA;
    totalSecciones += p.seccTotal;
  });

  var proyCompletos = proyectos.filter(function(p){ return p.smaCompleto; }).length;
  var proyPendientes = proyectos.length - proyCompletos;

  // KPIs
  var kpis = '<div style="display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;">'
    +'<div class="kpi a" style="flex:1;min-width:140px;"><div class="klabel">Proyectos SMA</div><div class="kval">'+proyectos.length+'</div><div class="ksub">'+mesSel+' '+anioSel+'</div></div>'
    +'<div class="kpi v" style="flex:1;min-width:140px;"><div class="klabel">Planillas completas</div><div class="kval">'+proyCompletos+'</div><div class="ksub">todas las secciones asignadas</div></div>'
    +'<div class="kpi r" style="flex:1;min-width:140px;"><div class="klabel">Con secciones sin asignar</div><div class="kval">'+proyPendientes+'</div><div class="ksub">'+(totalSecciones-totalCompletas)+' secc. sin responsable</div></div>'
    +'</div>';

  // Tarjetas por proyecto
  var cards = proyectos.map(function(p){
    var color = p.color;
    var barColor = p.smaCompleto ? '#1a5c2e' : p.smaPct>0 ? '#f57c00' : '#e0e0e0';
    var estadoPill = p.smaCompleto
      ? pill('✓ Planilla completa','p-ok')
      : p.seccConSMA>0
        ? pill(p.seccConSMA+'/'+p.seccTotal+' asignadas','p-parcial')
        : pill('Sin asignar','p-pend');

    var seccRows = p.secciones.map(function(s){
      var tieneResp = s.smaResp && s.smaResp.trim();
      var c = tieneResp ? gc(s.smaResp) : {bg:'#f5f5f5',fg:'#bbb'};
      return '<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;font-size:12px;'+(tieneResp?'':'background:var(--rojo-s);')+'">'
        +'<span style="font-size:11px;width:14px;text-align:center;color:'+(tieneResp?'var(--verde)':'var(--rojo)+\'\'')+';">'+(tieneResp?'✓':'○')+'</span>'
        +'<span style="flex:1;font-weight:500;color:var(--texto);">'+s.seccion+'</span>'
        +(tieneResp
          ? '<span class="av av-sm" style="background:'+c.bg+';color:'+c.fg+';">'+ini(s.smaResp)+'</span>'
            +'<span style="font-size:11px;color:var(--suave);">'+s.smaResp+'</span>'
          : '<span style="font-size:11px;color:var(--rojo);font-weight:600;">Sin responsable SMA</span>')
        +'</div>';
    }).join('');

    return '<div class="proy-card" style="border-left-color:'+color+';cursor:default;">'
      +'<div class="proy-nombre">'+p.proyecto+'</div>'
      +'<div class="proy-campana">'+p.campana+' · '+mesSel+' '+anioSel+'</div>'
      +'<div class="proy-prog-wrap">'
        +'<div class="proy-prog-bar"><div class="proy-prog-fill" style="width:'+p.smaPct+'%;background:'+barColor+';"></div></div>'
        +'<div class="proy-prog-pct">'+p.smaPct+'%</div>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;gap:3px;margin-bottom:10px;">'+seccRows+'</div>'
      +'<div style="text-align:right;">'+estadoPill+'</div>'
      +'</div>';
  }).join('');

  document.getElementById('sma-content').innerHTML = kpis
    +'<div class="proyectos-grid">'+cards+'</div>';
}

// ─── DÍAS RESTANTES ──────────────────────────────────────
function actualizarDias(){
  var now = new Date();
  var ultimo = new Date(now.getFullYear(), now.getMonth()+1, 0); // último día del mes
  var dias = ultimo.getDate() - now.getDate();
  var badge = document.getElementById('dias-badge');
  if(!badge) return;
  if(dias === 0){
    badge.textContent = '¡Último día del mes!';
    badge.className = 'dias-badge urgente';
  } else if(dias <= 5){
    badge.textContent = dias+' día'+(dias!==1?'s':'')+' para cierre';
    badge.className = 'dias-badge urgente';
  } else {
    badge.textContent = dias+' días para cierre';
    badge.className = 'dias-badge ok';
  }
}

// ─── HISTORIAL DE PROYECTO ───────────────────────────────
function verHistorial(nombre){
  cerrarDetalle();
  var rows = ALL.filter(function(r){ return r.proyecto===nombre; });
  if(!rows.length) return;

  // Agrupar por año+mes en orden cronológico
  var grupos = {};
  rows.forEach(function(r){
    var k = r.source+'||'+r.mes;
    if(!grupos[k]) grupos[k]={source:r.source, mes:r.mes, secciones:[]};
    grupos[k].secciones.push(r);
  });
  // Ordenar cronológicamente
  var orden = Object.keys(grupos).sort(function(a,b){
    var ga=grupos[a], gb=grupos[b];
    var ya=parseInt(ga.source), yb=parseInt(gb.source);
    if(ya!==yb) return ya-yb;
    return MESES_ORD.indexOf(ga.mes)-MESES_ORD.indexOf(gb.mes);
  });

  var campanas=[];
  rows.forEach(function(r){ var cn=r.campanaNorm||r.campana; if(cn&&campanas.indexOf(cn)<0) campanas.push(cn); });

  document.getElementById('hist-titulo').textContent = nombre;
  document.getElementById('hist-sub').textContent = campanas.join(' · ')+' · '+orden.length+' mes'+(orden.length!==1?'es':'')+' con datos';

  var timeline = orden.map(function(k, idx){
    var g = grupos[k];
    var tot = g.secciones.length;
    var comp = g.secciones.filter(function(s){ return s.completado; }).length;
    var pct = Math.round(comp/tot*100);
    var estPill = comp===tot ? pill('✓ Completo','p-ok') : comp>0 ? pill(comp+'/'+tot+' secc.','p-parcial') : pill('Sin iniciar','p-pend');

    var secciones = g.secciones.map(function(s){
      var c = gc(s.responsable);
      return '<div class="hist-secc">'+
        '<span style="width:14px;text-align:center;font-size:11px;">'+(s.completado?'✓':'○')+'</span>'+
        '<span style="flex:1;color:var(--texto);">'+s.seccion+'</span>'+
        '<span class="av av-sm" style="background:'+c.bg+';color:'+c.fg+';" title="'+s.responsable+'">'+ini(s.responsable)+'</span>'+
        '<span style="font-size:10px;color:var(--suave);">'+s.responsable+'</span>'+
      '</div>';
    }).join('');

    return '<div class="hist-mes">'+
      '<div class="hist-mes-header" onclick="this.nextElementSibling.classList.toggle(\'open\')">'+
        '<span class="hist-mes-label">'+g.mes+' '+g.source+'</span>'+
        '<span class="hist-mes-pill">'+estPill+'</span>'+
        '<span class="hist-mes-pct">'+pct+'%</span>'+
      '</div>'+
      '<div class="hist-mes-body'+(idx===orden.length-1?' open':'')+'">'+secciones+'</div>'+
    '</div>';
  }).join('');

  document.getElementById('hist-timeline').innerHTML = timeline;
  var panel = document.getElementById('hist-panel');
  panel.className = 'hist-panel visible';
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}
function cerrarHistorial(){
  document.getElementById('hist-panel').className = 'hist-panel';
}

// ─── VISTA ANUAL ─────────────────────────────────────────
var anioAnual = '2026';
var vistaAnual = 'matriz'; // 'matriz' | 'gantt'
var filtroAnual = 'todos'; // 'todos' | 'pendientes'
function selAnio(a, el){
  anioAnual = a;
  document.getElementById('anio-btn-2025').classList.remove('on');
  document.getElementById('anio-btn-2026').classList.remove('on');
  el.classList.add('on');
  renderAnual();
}
function selVistaAnual(v, el){
  vistaAnual = v;
  document.getElementById('vista-btn-matriz').classList.remove('on');
  document.getElementById('vista-btn-gantt').classList.remove('on');
  el.classList.add('on');
  document.getElementById('anual-hint').textContent = v==='gantt'
    ? 'Cada barra muestra el avance del proyecto en ese mes'
    : 'Haz clic en un mes para ir directamente';
  renderAnual();
}
function selFiltroAnual(f, el){
  filtroAnual = f;
  document.getElementById('filtro-btn-todos').classList.remove('on');
  document.getElementById('filtro-btn-pendientes').classList.remove('on');
  el.classList.add('on');
  renderAnual();
}
function renderAnual(){
  var data = ALL.filter(function(r){ return r.source===anioAnual; });
  if(!data.length){
    document.getElementById('anual-tabla').innerHTML='<div style="padding:30px;color:var(--suave);">Sin datos para '+anioAnual+'.</div>';
    return;
  }
  // Proyectos únicos
  var proyNombres = [];
  data.forEach(function(r){ if(r.proyecto&&proyNombres.indexOf(r.proyecto)<0) proyNombres.push(r.proyecto); });
  proyNombres.sort();

  // Construir mapa: proyecto → mes → {tot, comp}
  var mapa = {};
  proyNombres.forEach(function(p){ mapa[p]={}; });
  data.forEach(function(r){
    if(!mapa[r.proyecto]) return;
    if(!mapa[r.proyecto][r.mes]) mapa[r.proyecto][r.mes]={tot:0,comp:0};
    mapa[r.proyecto][r.mes].tot++;
    if(r.completado) mapa[r.proyecto][r.mes].comp++;
  });

  // Aplicar filtro: solo proyectos con algún mes incompleto
  if(filtroAnual === 'pendientes'){
    proyNombres = proyNombres.filter(function(p){
      return Object.keys(mapa[p]).some(function(m){
        var v = mapa[p][m]; return v.comp < v.tot;
      });
    });
  }

  if(vistaAnual === 'gantt'){
    renderGantt(proyNombres, mapa);
  } else {
    renderMatriz(proyNombres, mapa, data);
  }
}

function renderMatriz(proyNombres, mapa, data){
  var mesesDisp = MESES_ORD.filter(function(m){ return data.some(function(r){ return r.mes===m; }); });
  var th = '<tr><th class="th-proy">Proyecto</th>';
  mesesDisp.forEach(function(m){ th+='<th>'+m.substring(0,3)+'</th>'; });
  th+='</tr>';
  var tbody='';
  proyNombres.forEach(function(p){
    tbody+='<tr><td class="td-proy" style="border-left:3px solid '+getPrColor(p)+';">'+p+'</td>';
    mesesDisp.forEach(function(m){
      var v=mapa[p][m];
      if(!v){ tbody+='<td><span class="mes-dot vacio">—</span></td>'; return; }
      var pct=Math.round(v.comp/v.tot*100);
      var cls=pct===100?'ok':pct>0?'parcial':'sin';
      var lbl=pct===100?'✓':pct+'%';
      tbody+='<td><span class="mes-dot '+cls+'" title="'+p+' · '+m+' · '+v.comp+'/'+v.tot+' secc." onclick="irAMes(\''+m+'\',\''+anioAnual+'\')">'+lbl+'</span></td>';
    });
    tbody+='</tr>';
  });
  // Fila resumen
  var allData = ALL.filter(function(r){ return r.source===anioAnual; });
  tbody+='<tr class="total-row"><td class="td-proy" style="font-size:11px;color:var(--suave);">Total proyectos completados</td>';
  mesesDisp.forEach(function(m){
    var ps=getProy(allData.filter(function(r){return r.mes===m;}));
    var tot=ps.length, comp=ps.filter(function(p){return p.done;}).length;
    var cls=tot>0&&comp===tot?'ok':comp>0?'parcial':'sin';
    tbody+='<td><span class="mes-dot '+cls+'" style="width:36px;">'+comp+'/'+tot+'</span></td>';
  });
  tbody+='</tr>';
  document.getElementById('anual-tabla').innerHTML=
    '<table class="anual-table"><thead>'+th+'</thead><tbody>'+tbody+'</tbody></table>';
}

function renderGantt(proyNombres, mapa){
  // Todos los meses del año como columnas (o solo hasta hoy para 2026)
  var mesesAll = anioAnual==='2026'
    ? MESES_ORD.slice(0, new Date().getMonth()+1)
    : MESES_ORD;

  var th = '<tr><th class="th-proy" style="min-width:180px;">Proyecto</th>';
  mesesAll.forEach(function(m){ th+='<th style="min-width:52px;">'+m.substring(0,3)+'</th>'; });
  th += '<th style="min-width:60px;text-align:center;">Total</th></tr>';

  var tbody = '';
  proyNombres.forEach(function(p){
    var mesesProy = mesesAll.filter(function(m){ return mapa[p][m]; });
    var totSec=0, compSec=0;
    Object.keys(mapa[p]).forEach(function(m){ totSec+=mapa[p][m].tot; compSec+=mapa[p][m].comp; });
    var color = getPrColor(p);
    tbody += '<tr><td class="td-proy" style="border-left:3px solid '+color+';">'+p+'</td>';
    mesesAll.forEach(function(m){
      var v = mapa[p][m];
      if(!v){ tbody+='<td></td>'; return; }
      var pct = Math.round(v.comp/v.tot*100);
      var done = pct===100;
      // Barra de progreso horizontal estilo Gantt
      tbody += '<td style="padding:4px 3px;">'
        + '<div title="'+p+' · '+m+' · '+v.comp+'/'+v.tot+' sec." onclick="irAMes(\''+m+'\',\''+anioAnual+'\')" '
        + 'style="cursor:pointer;background:'+(done?'var(--verde-s)':'var(--amber-s)')+';border:1px solid '+(done?'var(--verde)':color)+';'
        + 'border-radius:4px;height:24px;position:relative;overflow:hidden;min-width:44px;">'
        + '<div style="position:absolute;left:0;top:0;height:100%;width:'+pct+'%;background:'+(done?'var(--verde)':color)+';opacity:0.35;transition:width .5s;"></div>'
        + '<span style="position:relative;font-size:9px;font-weight:700;color:'+(done?'var(--verde)':color)+';line-height:24px;display:block;text-align:center;">'
        + (done?'✓':pct+'%')+'</span>'
        + '</div></td>';
    });
    // Columna resumen total
    var tpct = totSec>0?Math.round(compSec/totSec*100):0;
    tbody += '<td style="text-align:center;">'
      + '<span class="pill '+(tpct===100?'p-ok':tpct>0?'p-parcial':'p-pend')+'">'+tpct+'%</span>'
      + '</td></tr>';
  });

  if(!proyNombres.length){
    tbody = '<tr><td colspan="'+(mesesAll.length+2)+'" style="padding:24px;color:var(--suave);text-align:center;">Sin proyectos con pendientes.</td></tr>';
  }

  document.getElementById('anual-tabla').innerHTML =
    '<div style="overflow-x:auto;"><table class="anual-table" style="min-width:600px;"><thead>'+th+'</thead><tbody>'+tbody+'</tbody></table></div>';
}
function irAMes(mes, anio){
  // Cambiar mes seleccionado y navegar al tab proyectos
  mesSel=mes; anioSel=anio;
  // Actualizar botón mes
  document.getElementById('mes-label').textContent=mes+' '+anio;
  document.querySelectorAll('.mes-btn').forEach(function(b){ b.classList.remove('on'); });
  render(); renderAlertas(); renderEquipo(); renderSMA(); renderPendientes(); buildSel();
  // Ir a tab proyectos
  var tabBtn = document.querySelector('.tab.active');
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.tc').forEach(function(t){ t.classList.remove('on'); });
  document.querySelector('[onclick="goTab(\'proyectos\',this)"]').classList.add('active');
  document.getElementById('tc-proyectos').classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}

// ─── EXPORTAR CSV ─────────────────────────────────────────
function exportarCSV(){
  var fd = getF();
  if(!fd.length){ alert('Sin datos para exportar.'); return; }
  var cols = ['Proyecto','Campaña','Sección','Responsable','Completado','Ubicación','Resp. SMA','Mes','Año'];
  var rows = [cols.join(',')];
  fd.forEach(function(r){
    rows.push([
      '"'+(r.proyecto||'').replace(/"/g,'""')+'"',
      '"'+(r.campanaNorm||r.campana||'').replace(/"/g,'""')+'"',
      '"'+(r.seccion||'').replace(/"/g,'""')+'"',
      '"'+(r.responsable||'').replace(/"/g,'""')+'"',
      r.completado?'Sí':'No',
      '"'+(r.ubicacion||'').replace(/"/g,'""')+'"',
      '"'+(r.smaResp||'').replace(/"/g,'""')+'"',
      r.mes, r.source
    ].join(','));
  });
  var blob = new Blob(['﻿'+rows.join('\n')], {type:'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'informes_'+mesSel+'_'+anioSel+'.csv';
  a.click();
}
