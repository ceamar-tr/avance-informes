<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avance Informes y Planillas SMA — CEAMAR</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--verde:#1a5c2e;--verde-s:#e8f5e9;--azul:#0d3d5c;--azul-c:#1565c0;--azul-s:#e3f2fd;--amber:#f57c00;--amber-s:#fff3e0;--rojo:#c62828;--rojo-s:#ffebee;--gris:#f4f6f8;--borde:#e0e0e0;--texto:#1a1a2e;--suave:#6b7280;--sombra:0 2px 12px rgba(0,0,0,0.08);--r:12px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#f0f4f8;color:var(--texto);min-height:100vh;}
  .header{background:linear-gradient(135deg,var(--verde) 0%,var(--azul) 100%);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
  .header-left{display:flex;align-items:center;gap:14px;}
  .logo-wrap{background:white;border-radius:10px;padding:5px 10px;display:flex;align-items:center;flex-shrink:0;}
  .logo-wrap img{height:40px;width:auto;display:block;}
  .htitle{color:white;font-size:16px;font-weight:600;}
  .hsub{color:rgba(255,255,255,0.6);font-size:11px;margin-top:2px;}
  .hright{display:flex;gap:8px;align-items:center;}
  .hbadge{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);}
  .dot{width:6px;height:6px;background:#4caf50;border-radius:50%;display:inline-block;margin-right:4px;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .wrap{max-width:1400px;margin:0 auto;padding:22px;}
  .syncbar{border-radius:8px;padding:10px 16px;font-size:11px;display:flex;align-items:center;gap:8px;margin-bottom:18px;}
  .syncbar.ok{background:var(--verde-s);border:1px solid #a5d6a7;color:var(--verde);}
  .syncbar.err{background:var(--rojo-s);border:1px solid #ef9a9a;color:var(--rojo);}
  .syncbar.loading{background:var(--azul-s);border:1px solid #90caf9;color:var(--azul-c);}
  .tabs{display:flex;gap:4px;margin-bottom:18px;background:white;padding:4px;border-radius:var(--r);box-shadow:var(--sombra);width:fit-content;}
  .tab{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:var(--suave);transition:all .2s;border:none;background:none;font-family:'DM Sans',sans-serif;}
  .tab:hover{background:var(--gris);color:var(--texto);}
  .tab.active{background:var(--verde);color:white;}
  .filtros{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
  .flabel{font-size:12px;color:var(--suave);font-weight:500;}
  .fchip{padding:5px 12px;border-radius:20px;font-size:12px;border:1px solid var(--borde);cursor:pointer;background:white;color:var(--suave);transition:all .2s;font-weight:500;}
  .fchip:hover{border-color:var(--verde);color:var(--verde);}
  .fchip.on{background:var(--azul);color:white;border-color:var(--azul);}
  .kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px;}
  .kpi{background:white;border-radius:var(--r);padding:15px 17px;box-shadow:var(--sombra);border-left:3px solid transparent;transition:transform .2s;}
  .kpi:hover{transform:translateY(-2px);}
  .kpi.v{border-left-color:var(--verde)}.kpi.a{border-left-color:var(--azul-c)}.kpi.am{border-left-color:var(--amber)}.kpi.r{border-left-color:var(--rojo)}.kpi.t{border-left-color:#00695c}
  .klabel{font-size:10px;color:var(--suave);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
  .kval{font-size:26px;font-weight:600;line-height:1;}
  .ksub{font-size:11px;color:var(--suave);margin-top:3px;}
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  .card{background:white;border-radius:var(--r);padding:18px;box-shadow:var(--sombra);}
  .card.full{grid-column:1/-1;}
  .ctitle{font-size:11px;font-weight:700;color:var(--suave);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--borde);}
  .twrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th{text-align:left;padding:7px 9px;font-size:10px;font-weight:700;color:var(--suave);text-transform:uppercase;border-bottom:1px solid var(--borde);white-space:nowrap;background:var(--gris);}
  td{padding:7px 9px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}tr:hover td{background:#fafafa;}
  .pc{font-weight:600;color:var(--azul);}
  .cc{font-size:10px;color:var(--suave);}
  .pill{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap;}
  .p-ok{background:var(--verde-s);color:var(--verde);}
  .p-pend{background:var(--amber-s);color:var(--amber);}
  .p-parcial{background:#e8eaf6;color:#283593;}
  .av{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;margin-right:4px;flex-shrink:0;}
  .blist{display:flex;flex-direction:column;gap:9px;}
  .bitem{display:flex;align-items:center;gap:9px;}
  .bname{font-size:11px;color:var(--suave);width:100px;flex-shrink:0;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .btrack{flex:1;height:14px;background:var(--gris);border-radius:7px;overflow:hidden;}
  .bfill{height:100%;border-radius:7px;}
  .bnum{font-size:11px;color:var(--suave);width:22px;}
  .dwrap{display:flex;align-items:center;gap:18px;}
  .dleg{display:flex;flex-direction:column;gap:9px;}
  .drow{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--suave);}
  .ddot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .dval{font-weight:600;color:var(--texto);margin-left:auto;}
  .rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
  .rcard{background:var(--gris);border-radius:10px;padding:11px;text-align:center;}
  .rav{width:38px;height:38px;border-radius:50%;margin:0 auto 7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
  .rname{font-size:12px;font-weight:600;margin-bottom:3px;}
  .rstats{font-size:10px;color:var(--suave);}
  .rbar{height:4px;background:var(--borde);border-radius:2px;margin-top:7px;overflow:hidden;}
  .rbarf{height:100%;border-radius:2px;}
  .spin{width:32px;height:32px;border:3px solid var(--borde);border-top-color:var(--verde);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading{display:flex;align-items:center;justify-content:center;padding:50px;flex-direction:column;gap:14px;}
  .ltext{font-size:13px;color:var(--suave);}
  .tc{display:none;}.tc.on{display:block;}
  .grupo-hdr td{background:#f0f4f8;font-weight:600;color:var(--azul);font-size:12px;border-top:2px solid var(--borde);}
  .prog-bar{height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;margin-top:3px;}
  .prog-fill{height:100%;border-radius:3px;}
  .mes-sel{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
  .mes-btn{padding:5px 12px;border-radius:20px;font-size:12px;border:1px solid #a5d6a7;cursor:pointer;background:white;color:var(--suave);transition:all .2s;font-weight:500;}
  .mes-btn:hover,.mes-btn.on{background:var(--verde);color:white;border-color:var(--verde);}
  .mes-btn.a25{border-color:var(--borde);}
  .mes-btn.a25:hover,.mes-btn.a25.on{background:var(--suave);color:white;border-color:var(--suave);}
  @media(max-width:900px){.kgrid{grid-template-columns:repeat(2,1fr)}.mgrid{grid-template-columns:1fr}.wrap{padding:14px}}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-wrap">
      <img src="https://drive.google.com/uc?export=view&id=1f9O6E1rR3PAuO_JbZieC3lZagpXuP-ad" alt="CEAMAR" onerror="this.style.display='none'">
    </div>
    <div>
      <div class="htitle">Avance Informes y Planillas SMA</div>
      <div class="hsub" id="fhdr">Cargando...</div>
    </div>
  </div>
  <div class="hright">
    <span class="hbadge"><span class="dot"></span>2025 · Live</span>
    <span class="hbadge"><span class="dot"></span>2026 · Live</span>
  </div>
</div>

<div class="wrap">
  <div class="syncbar loading" id="sbar">
    <div class="spin" style="width:14px;height:14px;border-width:2px;flex-shrink:0;"></div>
    <span id="stxt">Conectando con Google Sheets...</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="goTab('mes',this)">Mes actual</button>
    <button class="tab" onclick="goTab('resp',this)">Responsables</button>
    <button class="tab" onclick="goTab('proy',this)">Por proyecto</button>
    <button class="tab" onclick="goTab('sma',this)">Planillas SMA</button>
  </div>

  <div id="tc-mes" class="tc on">
    <div class="mes-sel" id="mes-sel"></div>
    <div class="filtros">
      <span class="flabel">Campaña:</span>
      <button class="fchip on" onclick="fCamp('Todas',this)">Todas</button>
      <button class="fchip" onclick="fCamp('Invierno',this)">Invierno</button>
      <button class="fchip" onclick="fCamp('Verano',this)">Verano</button>
      <button class="fchip" onclick="fCamp('Primavera',this)">Primavera</button>
      <button class="fchip" onclick="fCamp('Otoño',this)">Otoño</button>
    </div>
    <div class="kgrid" id="kgrid"><div class="loading"><div class="spin"></div></div></div>
    <div class="mgrid" id="mgrid"><div class="loading"><div class="spin"></div></div></div>
    <div class="card full">
      <div class="ctitle">Detalle por proyecto</div>
      <div class="twrap" id="tdetalle"><div class="loading"><div class="spin"></div><span class="ltext">Cargando...</span></div></div>
    </div>
  </div>

  <div id="tc-resp" class="tc">
    <div class="card full" style="margin-bottom:14px;"><div class="ctitle">Responsables informe</div><div id="ri"><div class="loading"><div class="spin"></div></div></div></div>
    <div class="card full"><div class="ctitle">Responsables SMA</div><div id="rs"><div class="loading"><div class="spin"></div></div></div></div>
  </div>
  <div id="tc-proy" class="tc"><div class="card full"><div class="ctitle">Avance por proyecto</div><div id="proy"><div class="loading"><div class="spin"></div></div></div></div></div>
  <div id="tc-sma" class="tc"><div class="card full"><div class="ctitle">Estado planillas SMA</div><div id="sma"><div class="loading"><div class="spin"></div></div></div></div></div>
</div>

<script>
var S25='1U7iVGcQ0C1YqNeZak1rV4ld5P9XTsOjWxybkBvw5aXg';
var S26='1hIBPoAE-zdTFc8v4ZMx0K9bzGTufOF_4nD8ERu4i7PM';
var HOJAS_2025=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
var HOJAS_2026=['Enero','Febrero','Marzo','Abril','Mayo'];
var MESES_ORD=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
var COLS=[{bg:'#e3f2fd',fg:'#1565c0'},{bg:'#e8f5e9',fg:'#1a5c2e'},{bg:'#fff3e0',fg:'#e65100'},{bg:'#fce4ec',fg:'#c62828'},{bg:'#e8eaf6',fg:'#283593'},{bg:'#e0f2f1',fg:'#00695c'},{bg:'#f3e5f5',fg:'#6a1b9a'},{bg:'#fff8e1',fg:'#f57f17'}];
var cmap={},ci=0;
function gc(n){if(!n)return COLS[0];var k=n.trim();if(!cmap[k]){cmap[k]=COLS[ci%COLS.length];ci++;}return cmap[k];}
function ini(n){if(!n||!n.trim())return'?';var p=n.trim().split(' ');return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n.substring(0,2).toUpperCase();}
function pill(t,c){return '<span class="pill '+c+'">'+t+'</span>';}
var ALL=[],camp='Todas',mesSel='',anioSel='2026';

function fetchSheet(id,sheetName,source){
  var url='https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(sheetName)+'&headers=1';
  return fetch(url).then(function(r){return r.text();}).then(function(txt){
    var m=txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if(!m)return[];
    var json=JSON.parse(m[1]);
    if(!json.table||!json.table.rows||!json.table.rows.length)return[];
    var rows=[],pA='',cA='',cnA='',aA='';
    json.table.rows.forEach(function(row){
      if(!row.c)return;
      function cv(i){var c=row.c[i];if(!c)return'';if(typeof c.v==='boolean')return c.v;return c.v==null?'':c.v;}
      var proyecto=String(cv(0)||'').trim(),campana=String(cv(1)||'').trim(),seccion=String(cv(2)||'').trim();
      var responsable=String(cv(3)||'').trim(),completado=(cv(4)===true||cv(4)==='TRUE');
      var ubicacion=String(cv(5)||'').trim(),smaResp=String(cv(7)||'').trim();
      var campaNorm=String(cv(8)||'').trim(),anio=cv(9)?String(cv(9)).trim():'';
      if(proyecto)pA=proyecto;if(campana)cA=campana;if(campaNorm)cnA=campaNorm;if(anio)aA=anio;
      if(!seccion)return;
      rows.push({proyecto:pA,campana:cA,campanaNorm:cnA,anio:aA||source,seccion:seccion,responsable:responsable,completado:completado,ubicacion:ubicacion,smaResp:smaResp,mes:sheetName,source:source});
    });
    return rows;
  }).catch(function(){return[];});
}

function cargar(){
  var promises=[];
  HOJAS_2025.forEach(function(mes){promises.push(fetchSheet(S25,mes,'2025'));});
  HOJAS_2026.forEach(function(mes){promises.push(fetchSheet(S26,mes,'2026'));});
  var total=promises.length,done=0;
  var tracked=promises.map(function(p){return p.then(function(r){done++;document.getElementById('stxt').textContent='Cargando... '+done+'/'+total+' hojas';return r;});});
  Promise.all(tracked).then(function(results){
    ALL=[];results.forEach(function(r){ALL=ALL.concat(r);});
    var now=new Date(),rec=detectRec();mesSel=rec.mes;anioSel=rec.anio;
    document.getElementById('fhdr').textContent=now.toLocaleDateString('es-CL',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    document.getElementById('sbar').className='syncbar ok';
    document.getElementById('stxt').textContent='✓ Sincronizado · '+ALL.length+' secciones · '+mesSel+' '+anioSel+' · '+now.toLocaleTimeString('es-CL');
    buildSel();render();
  }).catch(function(e){
    document.getElementById('sbar').className='syncbar err';
    document.getElementById('stxt').textContent='Error: '+e.message;
  });
}

function getProy(rows){
  var map={};
  rows.forEach(function(r){
    var k=r.proyecto+'||'+r.campana+'||'+r.source+'||'+r.mes;
    if(!map[k])map[k]={proyecto:r.proyecto,campana:r.campana,campanaNorm:r.campanaNorm,mes:r.mes,source:r.source,secciones:[],resp:[],sma:[]};
    map[k].secciones.push(r);
    if(r.responsable&&map[k].resp.indexOf(r.responsable)<0)map[k].resp.push(r.responsable);
    if(r.smaResp&&map[k].sma.indexOf(r.smaResp)<0)map[k].sma.push(r.smaResp);
  });
  return Object.keys(map).map(function(k){
    var p=map[k],tot=p.secciones.length,comp=p.secciones.filter(function(s){return s.completado;}).length;
    return Object.assign({},p,{tot:tot,comp:comp,pct:tot>0?Math.round(comp/tot*100):0,done:comp===tot});
  });
}

function detectRec(){
  for(var i=MESES_ORD.length-1;i>=0;i--){if(ALL.some(function(r){return r.mes===MESES_ORD[i]&&r.source==='2026';}))return{mes:MESES_ORD[i],anio:'2026'};}
  for(var i=MESES_ORD.length-1;i>=0;i--){if(ALL.some(function(r){return r.mes===MESES_ORD[i]&&r.source==='2025';}))return{mes:MESES_ORD[i],anio:'2025'};}
  return{mes:'Enero',anio:'2026'};
}

function buildSel(){
  var m26=[],m25=[];
  ALL.forEach(function(r){if(r.source==='2026'&&m26.indexOf(r.mes)<0)m26.push(r.mes);if(r.source==='2025'&&m25.indexOf(r.mes)<0)m25.push(r.mes);});
  var h='<span class="flabel">Mes:</span> <span class="flabel" style="color:var(--verde)">2026:</span> ';
  MESES_ORD.forEach(function(m){if(m26.indexOf(m)>=0){var on=(m===mesSel&&anioSel==='2026')?' on':'';h+='<button class="mes-btn'+on+'" onclick="selMes(\''+m+'\',\'2026\',this)">'+m.substring(0,3)+'</button> ';}});
  h+='<span class="flabel" style="color:var(--suave)">2025:</span> ';
  MESES_ORD.forEach(function(m){if(m25.indexOf(m)>=0){var on=(m===mesSel&&anioSel==='2025')?' on':'';h+='<button class="mes-btn a25'+on+'" onclick="selMes(\''+m+'\',\'2025\',this)">'+m.substring(0,3)+'</button> ';}});
  document.getElementById('mes-sel').innerHTML=h;
}

function selMes(m,a,el){mesSel=m;anioSel=a;document.querySelectorAll('.mes-btn').forEach(function(b){b.classList.remove('on');});el.classList.add('on');render();}
function goTab(id,el){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});el.classList.add('active');document.querySelectorAll('.tc').forEach(function(t){t.classList.remove('on');});document.getElementById('tc-'+id).classList.add('on');}
function fCamp(v,el){camp=v;document.querySelectorAll('.fchip').forEach(function(c){c.classList.remove('on');});el.classList.add('on');render();}
function getF(){return ALL.filter(function(r){return r.mes===mesSel&&r.source===anioSel&&(camp==='Todas'||r.campanaNorm===camp);});}
function ep(p){return p.done?pill('✓ Completo','p-ok'):p.comp>0?pill(p.comp+'/'+p.tot+' secc.','p-parcial'):pill('Sin iniciar','p-pend');}

function render(){
  var fd=getF(),proyectos=getProy(fd);
  var tP=proyectos.length,cP=proyectos.filter(function(p){return p.done;}).length,peP=tP-cP;
  var pct=tP>0?Math.round(cP/tP*100):0;
  var allR=[];fd.forEach(function(r){if(r.responsable&&allR.indexOf(r.responsable)<0)allR.push(r.responsable);});
  var sinSMA=proyectos.filter(function(p){return p.sma.length===0;}).length;

  document.getElementById('kgrid').innerHTML=
    '<div class="kpi a"><div class="klabel">Total proyectos</div><div class="kval">'+tP+'</div><div class="ksub">'+mesSel+' '+anioSel+'</div></div>'+
    '<div class="kpi v"><div class="klabel">Completados</div><div class="kval">'+cP+'</div><div class="ksub">'+pct+'%</div></div>'+
    '<div class="kpi am"><div class="klabel">Pendientes</div><div class="kval">'+peP+'</div><div class="ksub">'+(100-pct)+'%</div></div>'+
    '<div class="kpi t"><div class="klabel">Responsables</div><div class="kval">'+allR.length+'</div><div class="ksub">activos</div></div>'+
    '<div class="kpi r"><div class="klabel">Sin resp. SMA</div><div class="kval">'+sinSMA+'</div><div class="ksub">proyectos</div></div>';

  var byR={};fd.forEach(function(r){if(!r.responsable)return;if(!byR[r.responsable])byR[r.responsable]=0;byR[r.responsable]++;});
  var maxR=1;Object.keys(byR).forEach(function(k){if(byR[k]>maxR)maxR=byR[k];});
  var bars=Object.keys(byR).sort(function(a,b){return byR[b]-byR[a];}).slice(0,8).map(function(n){
    var c=gc(n);return '<div class="bitem"><span class="bname" title="'+n+'">'+n+'</span><div class="btrack"><div class="bfill" style="width:'+Math.round(byR[n]/maxR*100)+'%;background:'+c.fg+';opacity:.85;"></div></div><span class="bnum">'+byR[n]+'</span></div>';
  }).join('');

  var rv=36,circ=2*Math.PI*rv,d1=cP/Math.max(tP,1)*circ,d2=peP/Math.max(tP,1)*circ,o1=-circ*.25,o2=o1-d1;
  var donut=tP>0?
    '<circle cx="50" cy="50" r="'+rv+'" fill="none" stroke="#1a5c2e" stroke-width="18" stroke-dasharray="'+d1+' '+circ+'" stroke-dashoffset="'+o1+'" stroke-linecap="round"/>'+
    '<circle cx="50" cy="50" r="'+rv+'" fill="none" stroke="#f57c00" stroke-width="18" stroke-dasharray="'+d2+' '+circ+'" stroke-dashoffset="'+o2+'" stroke-linecap="round"/>':'';

  document.getElementById('mgrid').innerHTML=
    '<div class="card"><div class="ctitle">Secciones por responsable</div><div class="blist">'+(bars||'Sin datos')+'</div></div>'+
    '<div class="card"><div class="ctitle">Estado de proyectos</div><div class="dwrap">'+
    '<svg width="110" height="110" viewBox="0 0 100 100"><circle cx="50" cy="50" r="'+rv+'" fill="none" stroke="#f0f0f0" stroke-width="18"/>'+donut+
    '<text x="50" y="47" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">'+tP+'</text>'+
    '<text x="50" y="60" text-anchor="middle" font-size="8" fill="#6b7280">proyectos</text></svg>'+
    '<div class="dleg"><div class="drow"><span class="ddot" style="background:#1a5c2e;"></span>Completado<span class="dval">'+cP+'</span></div>'+
    '<div class="drow"><span class="ddot" style="background:#f57c00;"></span>Pendiente<span class="dval">'+peP+'</span></div></div></div></div>';

  if(!proyectos.length){
    document.getElementById('tdetalle').innerHTML='<div style="padding:20px;color:var(--suave);">Sin datos para este mes.</div>';
  } else {
    var th='<table><thead><tr><th>Proyecto / Sección</th><th>Campaña</th><th>Responsable</th><th>Estado</th><th>Archivo</th><th>Resp. SMA</th></tr></thead><tbody>';
    proyectos.forEach(function(p){
      th+='<tr class="grupo-hdr"><td><strong>'+p.proyecto+'</strong></td><td class="cc">'+p.campana+'</td>'+
        '<td style="font-size:11px;">'+p.resp.join(', ')+'</td>'+
        '<td>'+ep(p)+'<div class="prog-bar"><div class="prog-fill" style="width:'+p.pct+'%;background:'+(p.done?'#1a5c2e':'#f57c00')+';"></div></div></td>'+
        '<td>—</td><td style="font-size:11px;">'+(p.sma.join(', ')||'<span style="color:var(--rojo);">Sin asignar</span>')+'</td></tr>';
      p.secciones.forEach(function(s){
        var c=gc(s.responsable),cS=gc(s.smaResp);
        th+='<tr><td style="padding-left:28px;font-size:11px;">↳ '+s.seccion+'</td><td></td>'+
          '<td><div style="display:flex;align-items:center;"><span class="av" style="background:'+c.bg+';color:'+c.fg+';">'+ini(s.responsable)+'</span>'+s.responsable+'</div></td>'+
          '<td>'+(s.completado?pill('✓','p-ok'):pill('Pendiente','p-pend'))+'</td>'+
          '<td style="font-size:10px;color:var(--suave);">'+(s.ubicacion||'—')+'</td>'+
          '<td>'+(s.smaResp?'<span class="av" style="background:'+cS.bg+';color:'+cS.fg+';">'+ini(s.smaResp)+'</span>'+s.smaResp:'—')+'</td></tr>';
      });
    });
    document.getElementById('tdetalle').innerHTML=th+'</tbody></table>';
  }

  var byRI={},byRS={};
  ALL.forEach(function(r){
    if(r.responsable){if(!byRI[r.responsable])byRI[r.responsable]={t:0,c:0};byRI[r.responsable].t++;if(r.completado)byRI[r.responsable].c++;}
    var k=r.smaResp||'Sin asignar';if(!byRS[k])byRS[k]={t:0,c:0};byRS[k].t++;if(r.completado)byRS[k].c++;
  });
  function mkC(obj){return Object.keys(obj).sort(function(a,b){return obj[b].t-obj[a].t;}).map(function(n){
    var c=n==='Sin asignar'?{bg:'#ffebee',fg:'#c62828'}:gc(n),p2=Math.round(obj[n].c/obj[n].t*100);
    return '<div class="rcard"><div class="rav" style="background:'+c.bg+';color:'+c.fg+';">'+(n==='Sin asignar'?'!':ini(n))+'</div>'+
      '<div class="rname">'+n+'</div><div class="rstats">'+obj[n].t+' secc. · '+p2+'%</div>'+
      '<div class="rbar"><div class="rbarf" style="width:'+p2+'%;background:'+c.fg+';"></div></div></div>';
  }).join('');}
  if(document.getElementById('ri'))document.getElementById('ri').innerHTML='<div class="rgrid">'+mkC(byRI)+'</div>';
  if(document.getElementById('rs'))document.getElementById('rs').innerHTML='<div class="rgrid">'+mkC(byRS)+'</div>';

  var allP=getProy(ALL);
  var ph=allP.sort(function(a,b){return a.pct-b.pct;}).map(function(p){
    return '<tr><td class="pc">'+p.proyecto+'</td><td>'+(p.campanaNorm||p.campana)+'</td><td>'+p.tot+'</td><td>'+p.comp+'</td><td>'+(p.tot-p.comp)+'</td>'+
      '<td><div class="prog-bar" style="margin-bottom:3px;"><div class="prog-fill" style="width:'+p.pct+'%;background:'+(p.done?'#1a5c2e':'#f57c00')+';"></div></div><span style="font-size:10px;color:var(--suave);">'+p.pct+'%</span></td>'+
      '<td>'+ep(p)+'</td><td style="font-size:11px;">'+p.resp.join(', ')+'</td><td style="font-size:10px;color:var(--suave);">'+p.mes+' '+p.source+'</td></tr>';
  }).join('');
  if(document.getElementById('proy'))document.getElementById('proy').innerHTML='<div class="twrap"><table><thead><tr><th>Proyecto</th><th>Campaña</th><th>Total</th><th>Comp.</th><th>Pend.</th><th>Avance</th><th>Estado</th><th>Responsables</th><th>Fuente</th></tr></thead><tbody>'+ph+'</tbody></table></div>';

  var sinS=allP.filter(function(p){return p.sma.length===0;}),conS=allP.filter(function(p){return p.sma.length>0;});
  var sr=sinS.map(function(p){return '<tr><td class="pc">'+p.proyecto+'</td><td>'+p.campana+'</td><td style="font-size:11px;">'+p.resp.join(', ')+'</td><td>'+ep(p)+'</td><td style="font-size:10px;color:var(--suave);">'+p.mes+' '+p.source+'</td></tr>';}).join('');
  if(document.getElementById('sma'))document.getElementById('sma').innerHTML=
    '<div style="display:flex;gap:12px;margin-bottom:14px;">'+
    '<div class="kpi v" style="flex:1;"><div class="klabel">Con resp. SMA</div><div class="kval">'+conS.length+'</div></div>'+
    '<div class="kpi r" style="flex:1;"><div class="klabel">Sin resp. SMA</div><div class="kval">'+sinS.length+'</div></div></div>'+
    (sinS.length>0?'<div class="twrap"><table><thead><tr><th>Proyecto</th><th>Campaña</th><th>Responsable</th><th>Estado</th><th>Fuente</th></tr></thead><tbody>'+sr+'</tbody></table></div>':'<div style="color:var(--verde);padding:12px;">✓ Todos tienen responsable SMA.</div>');
}

cargar();
</script>
</body>
</html>
